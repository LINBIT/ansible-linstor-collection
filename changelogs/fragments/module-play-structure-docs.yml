---
minor_changes:
  - >
    plugins/modules - document the recommended play structure for invoking
    LINSTOR API modules from user-written playbooks: dedicate a play with a
    single host such as ``hosts: linstor_controllers[0]`` and
    ``connection: local`` for directly accessing the LINSTOR controller, or
    set ``delegate_to: localhost`` on the task (or a wrapping ``block:``) when
    mixing into a multi-host play. Each module's first example now includes
    ``delegate_to: localhost`` to model the pattern at the example level.
    Each notes section also calls out that the collection's action plugins
    force ``become: false`` on every API module automatically.
