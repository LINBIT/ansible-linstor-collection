# SPDX-License-Identifier: MIT
---
minor_changes:
  - >
    ``~/.config/linstor/linstor-client.conf`` is auto-materialized on
    every cluster bring-up so subsequent ``linstor`` CLI invocations
    on the control node target the right cluster. ``client_install``
    writes the plain variant when ``linstor_ssl`` is false;
    ``ssl_init`` fetches the cluster's CA from a controller and
    writes the ``linstors://`` variant.
  - >
    ``linstor_connection.py`` (shared module util) now reads client
    certificate paths from both ``/etc/linstor/`` and the XDG user
    config directory so control-node-side runs and on-node CLI
    invocations pick the same credentials.
