# SPDX-License-Identifier: MIT
---
bugfixes:
  - >
    satellite_install - install EPEL via ``oracle-epel-release-elN`` on Oracle
    Linux for the ZFS repository setup; Oracle Linux does not provide the
    ``epel-release`` package. Covers both the UEK and RHCK ZFS task paths.
  - >
    satellite_install - fix the Oracle UEK ZFS DKMS build, which used
    ``ansible.builtin.command`` with a ``$(rpm -q ...)`` substitution that a
    non-shell command never expands. Consolidate the EL8 and EL9+ build steps
    into one ``ansible.builtin.shell`` task that runs ``dkms autoinstall`` (with
    the EL8 gcc-toolset-11 prefix), so the build path is identical across
    EL8/9/10.
