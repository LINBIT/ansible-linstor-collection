# SPDX-License-Identifier: MIT
---
bugfixes:
  - >
    satellite_install - install EPEL via ``oracle-epel-release-elN`` on Oracle
    Linux for the ZFS repository setup; Oracle Linux does not provide the
    ``epel-release`` package. Covers both the UEK and RHCK ZFS task paths.
  - >
    satellite_install - fix the Oracle UEK ZFS DKMS build. Replaces an
    ``ansible.builtin.command`` with a ``$(rpm -q ...)`` substitution that a
    non-shell command never expands, and detects the compiler the UEK kernel
    was built with to install and source the matching ``gcc-toolset`` (for
    example gcc-toolset-11 on EL8, gcc-toolset-14 on EL9) only when it differs
    from the system GCC. Fixes EL9/UEKR8, which failed with a misleading
    "CONFIG_MODULES is defined... no" error.
