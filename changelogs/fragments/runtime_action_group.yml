---
minor_changes:
  - >
    New ``linstor`` action group in ``meta/runtime.yml`` covering
    every LINSTOR object module. Combined with the new
    ``controller_env`` lookup, a single
    ``module_defaults: group/linbit.linstor.linstor:`` block sets
    the controller URI once for a whole play or block instead of
    repeating ``controllers:`` on every module call. Keeps user
    playbooks ergonomic now that modules run from the control node.
