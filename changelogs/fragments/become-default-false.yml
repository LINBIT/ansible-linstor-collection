---
minor_changes:
  - >
    plugins/action - add a shared action-plugin base that forces
    ``become: false`` for every LINSTOR API module (the ``linstor``
    action group in ``meta/runtime.yml``: ``node``, ``resource``,
    ``resource_group``, ``storage_pool``, etc.). These modules talk to
    the LINSTOR REST API and are typically delegated, so a parent play's
    ``become: true`` was bleeding in and triggering a sudo prompt on the
    Ansible control node. Roles no longer need to set
    ``become: false`` on every API task. Tasks that genuinely need
    privileged execution on the delegate can still opt in with
    ``become_user: root``.
