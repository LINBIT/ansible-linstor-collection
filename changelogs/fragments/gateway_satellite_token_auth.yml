minor_changes:
  - gateway_satellite - configure the ``linstor-gateway`` daemon for a
    token-authenticated controller (LINSTOR 1.34.0). When token authentication
    is enabled, the role creates a dedicated per-node token, writes it and the
    controller CA into ``gateway_satellite_config_dir``, and points the daemon
    at both through a systemd drop-in (``LS_BEARER_TOKEN_FILE`` and
    ``LS_ROOT_CA_FILE``). Auto-detected from the controller, or forced with
    ``gateway_satellite_token_auth``. The token is created only when missing;
    ``gateway_satellite_token_force`` creates a fresh one for rotation.
