# SPDX-License-Identifier: MIT
minor_changes:
  - auth_init - new role to initialize LINSTOR token authentication. Saves the
    user token to the control-node ``~/.config/linstor/linstor-client.conf`` and
    to the controller's ``/root/.config/linstor/linstor-client.conf`` (the same
    location native ``linstor controller auth init`` uses), both at mode
    ``0600``. The system-wide ``/etc/linstor/linstor-client.conf`` is left a
    stock ``0644`` file without a token.
  - client_install - new ``linstor_client_auth_token`` variable renders an
    ``auth-token`` entry into ``linstor-client.conf``. New
    ``configure-controller-node`` task file writes the root user's
    ``/root/.config/linstor/linstor-client.conf`` at mode ``0600``.
  - cluster_init - new ``cluster_init_token_auth`` flag (default ``true``) includes
    the ``auth_init`` role after cluster membership registration. The role
    version-gates itself on the installed ``linstor-controller`` package, so
    clusters older than 1.34.0 skip token authentication cleanly. Set the flag
    to ``false`` to disable.
