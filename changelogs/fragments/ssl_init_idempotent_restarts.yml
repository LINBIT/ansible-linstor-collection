---
minor_changes:
  - >
    ssl_init - convert the controller/satellite restart sequence to
    handlers notified by change-producing tasks. A re-run that produces
    no changes now fires zero restarts; a partial re-run (new node,
    regenerated keystore, edited ``linstor.toml``) only triggers the
    handler chain when keystores, truststores, or SSL TOML actually
    changed. Handler order in ``handlers/main.yml`` is load-bearing
    (Ansible fires handlers in defined order, not notify order).
