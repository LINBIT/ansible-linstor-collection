# SPDX-License-Identifier: MIT
bugfixes:
  - ssl_init - create the managed-node SSL directory (``/etc/linstor/ssl``) mode
    ``0755`` instead of ``0700`` so the non-root ``linstor-controller`` service
    user introduced in LINSTOR 1.34.0 can traverse it to read its keystore.
    Previously the controller failed to start HTTPS with a keystore
    "Permission denied" error. The private key (``node.key``) keeps its ``0600``
    mode.
