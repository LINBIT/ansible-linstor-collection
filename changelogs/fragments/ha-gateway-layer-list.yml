# SPDX-License-Identifier: MIT
---
minor_changes:
  - >
    resource - add a layer_list parameter to set the resource definition's
    DRBD layer stack in manual and autoplace modes. Spawn mode takes its
    layers from the resource group.
  - >
    ha_gateway - add a per-target layer_list option to set the DRBD layer
    stack on iSCSI, NFS, and NVMe-oF targets, for example to add a LUKS
    layer for encryption. It applies to manual and autoplace targets.
    Resource group targets take their layers from the group.
