---
- name: Install LINSTOR Gateway from package manager
  ansible.builtin.package:
    name: linstor-gateway
    state: present
  failed_when: false
  notify: restart_linstor_gateway

- name: Determine if linstor-gateway is installed
  ansible.builtin.package_facts:
    manager: auto

# Fix later - GitHub release will not update after initiallation
- name: Install LINSTOR Gateway from GitHub
  ansible.builtin.get_url:
    url: "{{ linstor_gw_github_release }}"
    dest: '/usr/sbin/linstor-gateway'
    mode: '755'
  when: "'linstor-gateway' not in ansible_facts.packages"
  notify: restart_linstor_gateway

# Only needed when installing from github?
- name: Create linstor-gateway systemd service
  ansible.builtin.copy:
    src: linstor-gateway.service
    dest: /etc/systemd/system/linstor-gateway.service
    mode: '644'
  when: "'linstor-gateway' not in ansible_facts.packages"

- name: Create /etc/linstor-gateway if it does not exist
  ansible.builtin.file:
    path: /etc/linstor-gateway
    state: directory
    mode: '0755'

- name: Setup linstor-gateway.toml
  ansible.builtin.template:
    src: linstor-gateway.j2
    dest: /etc/linstor-gateway/linstor-gateway.toml
    mode: '644'

- name: Check if firewalld is running
  ansible.builtin.shell: systemctl status firewalld
  register: linstor_gateway_firewalld
  failed_when: (linstor_gateway_firewalld.rc not in [0, 3, 4])
  changed_when: false
  when: ansible_os_family | lower in ['redhat', 'suse']

- name: Open firewall ports for LINSTOR Gateway client server
  ansible.posix.firewalld:
    port: "{{ item.port }}"
    permanent: true
    immediate: true
    state: enabled
  when:
    - ansible_os_family | lower in ['redhat', 'suse']
    - linstor_gateway_firewalld.rc is defined
    - linstor_gateway_firewalld.rc == 0
  with_items:
    - { name: linstor-gateway, port: 8337/tcp }

- name: Start and enable LINSTOR Gateway service
  ansible.builtin.systemd_service:
    name: linstor-gateway.service
    state: started
    enabled: true

# Restart the linstor-gateway service if it has been updated
- name: Flush handlers for linstor_gateway_install_client
  ansible.builtin.meta: flush_handlers
