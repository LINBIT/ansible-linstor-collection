---
# tasks file for linstor_controller
- name: Assert the linstor_controllers group has at least one host
  ansible.builtin.assert:
    that: groups.get('linstor_controllers', []) | length > 0
    fail_msg: >-
      The linstor_controllers inventory group is empty. Define at least one
      controller host before running controller_install.
    quiet: true
  run_once: true  # noqa: run-once[task]

- name: Gather OS facts for OS-specific vars
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - min
  when: ansible_facts['os_family'] is not defined

- name: Check if linstor-controller is already installed
  ansible.builtin.stat:
    path: /usr/lib/systemd/system/linstor-controller.service
  register: _controller_install_check

- name: Install LINSTOR controller packages
  ansible.builtin.package:
    name: "{{ _controller_install_packages_list }}"
    state: "{{ controller_install_package_state }}"
  vars:
    _controller_install_packages_list: >-
      {{ ['linstor-controller']
         + (['linstor-gui'] if controller_install_gui | bool else []) }}
  when:
    - not _controller_install_check.stat.exists
      or controller_install_package_state != 'present'
  register: _controller_install_packages
  until: _controller_install_packages is succeeded
  retries: 3
  delay: 10

- name: Configure LINSTOR controller # noqa: no-handler
  ansible.builtin.include_tasks: configure-controller.yml
  when:
    (_controller_install_packages is changed) or
    (controller_install_force_reconfigure | bool)
