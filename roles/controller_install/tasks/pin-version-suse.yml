---
# Zypper does not support version globbing, so resolve the exact version.
# linstor-controller and linstor-common share an exact dependency, so one
# lookup gives the version for both.
- name: Resolve pinned LINSTOR version (Zypper)
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail;
      zypper --non-interactive se -s --match-exact linstor-controller
      | awk -F'|' '$4 ~ /^ *{{ linstor_install_version }}/ {
      gsub(/^ +| +$/, "", $4); print $4; exit }'
  register: _controller_install_suse_version
  changed_when: false

- name: Pin LINSTOR controller and common to a version (Zypper)
  ansible.builtin.set_fact:
    _controller_install_packages_list: >-
      {{ _controller_install_packages_list
         | reject('equalto', 'linstor-controller')
         | list
         + ['linstor-controller=' ~ _controller_install_suse_version.stdout,
            'linstor-common=' ~ _controller_install_suse_version.stdout] }}
  when: _controller_install_suse_version.stdout | length > 0
