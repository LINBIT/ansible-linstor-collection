# SPDX-License-Identifier: MIT
---
- name: Install DNF versionlock plugin
  ansible.builtin.dnf:
    name: python3-dnf-plugin-versionlock
    state: present
  register: _controller_install_versionlock_plugin
  until: _controller_install_versionlock_plugin is succeeded
  retries: 3
  delay: 10

- name: Lock LINSTOR controller package versions (DNF)
  community.general.dnf_versionlock:
    name:
      - linstor-controller
      - linstor-common
    state: present
