---
argument_specs:
  main:
    short_description: Install and configure the LINSTOR client
    description:
      - Install and configure the LINSTOR client.
      - Deploys C(/etc/linstor/linstor-client.conf) with controller addresses.
    options:
      linstor_controller_addresses:
        type: list
        elements: str
        description:
          - List of controller IPs for C(linstor-client.conf).
          - Auto-discovered from the C(linstor_controllers) group C(replication_ip) values.
      linstor_client_https:
        type: bool
        default: false
        description:
          - Use the C(linstor+ssl://) URI scheme in C(linstor-client.conf).
      linstor_client_cafile:
        type: str
        default: ""
        description:
          - Path to the CA certificate that verifies the controller over HTTPS.
          - Emitted as C(cafile=) in C(linstor-client.conf) when set.
      linstor_client_certfile:
        type: str
        default: ""
        description:
          - Path to the client certificate for mutual TLS authentication.
          - Emitted as C(certfile=) in C(linstor-client.conf) when set.
      linstor_client_keyfile:
        type: str
        default: ""
        description:
          - Path to the client private key for mutual TLS authentication.
          - Emitted as C(keyfile=) in C(linstor-client.conf) when set.
      linstor_client_auth_token:
        type: str
        default: ""
        description:
          - LINSTOR auth token for clusters with token authentication enabled.
          - Emitted as C(auth-token =) in the rendered C(linstor-client.conf) when set.
          - Used by the C(configure-control-node) and C(configure-controller-node) task
            files, which write their token-bearing config C(0600). The system-wide
            C(configure-client) task does not set this and leaves C(/etc/linstor/linstor-client.conf)
            a stock C(0644) file without a token.
      client_install_force_reconfigure:
        type: bool
        default: false
        description:
          - Force re-running the configure phase even when the LINSTOR client
            package install reports unchanged.
          - Re-asserts C(/etc/linstor/) directory and re-templates
            C(linstor-client.conf).
          - Use for drift correction after manual edits to client.conf.
