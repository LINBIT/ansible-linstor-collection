---
# defaults file for client_install
client_install_package_state: present
linstor_controller_addresses:
  "{{ groups['linstor_controllers'] | map('extract', hostvars, 'replication_ip') | list | flatten }}"

# Automatically discover HA VIP from controller aux properties on subsequent runs.
# Set to false to skip VIP discovery and always use linstor_controller_addresses.
client_install_vip_discovery: true

# HTTPS client configuration
linstor_client_https: false
linstor_client_certfile: ""
linstor_client_keyfile: ""
