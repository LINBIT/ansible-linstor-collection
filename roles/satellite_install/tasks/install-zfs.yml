---
- name: Check if ZFS is already installed
  ansible.builtin.command:
    cmd: which zfs
  register: _satellite_install_zfs_check
  changed_when: false
  failed_when: false

- name: Install and configure ZFS
  when: _satellite_install_zfs_check.rc != 0
  block:
    # Not needed for Ubuntu or Proxmox (ships zfsutils-linux)
    - name: Enable Debian contrib repository for ZFS
      ansible.builtin.include_tasks: install-zfs-debian.yml
      when:
        - ansible_facts['distribution'] | lower == 'debian'
        - not (ansible_facts | linbit.common.is_pve)

    - name: Install ZFS utilities (APT)
      ansible.builtin.package:
        name: zfsutils-linux
        state: present
      when: ansible_facts['os_family'] | lower == 'debian'

    - name: Install ZFS packages (UEK kernel)
      ansible.builtin.include_tasks: install-zfs-oraclelinux.yml
      when:
        - ansible_facts['os_family'] | lower == 'redhat'
        - ansible_facts | linbit.common.is_uek

    - name: Install ZFS packages (DNF)
      ansible.builtin.include_tasks: install-zfs-redhat.yml
      when:
        - ansible_facts['os_family'] | lower == 'redhat'
        - not (ansible_facts | linbit.common.is_uek)

    - name: Install ZFS packages (Zypper)
      ansible.builtin.include_tasks: install-zfs-suse.yml
      when: ansible_facts['os_family'] | lower == 'suse'

- name: Allow unsupported kernel modules for ZFS (SUSE)
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/10-unsupported-modules.conf
    regexp: '^allow_unsupported_modules'
    line: 'allow_unsupported_modules 1'
    create: true
    mode: '0644'
  when: ansible_facts['os_family'] | lower == 'suse'

- name: Load ZFS kernel module and persist across reboots
  community.general.modprobe:
    name: zfs
    state: present
    persistent: present
