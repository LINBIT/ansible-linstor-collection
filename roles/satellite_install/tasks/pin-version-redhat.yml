---
# DNF accepts a name-version glob, for example linstor-satellite-1.33.3*
- name: Pin LINSTOR satellite and common to a version (DNF)
  ansible.builtin.set_fact:
    _satellite_install_packages_list: >-
      {{ _satellite_install_packages_list
         | reject('equalto', 'linstor-satellite')
         | list
         + ['linstor-satellite-' ~ linstor_install_version ~ '*',
            'linstor-common-' ~ linstor_install_version ~ '*'] }}
