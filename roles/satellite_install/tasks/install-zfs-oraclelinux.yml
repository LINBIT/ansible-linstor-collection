# SPDX-License-Identifier: MIT
---
# UEK kernels are built with a newer gcc than the EL default - match it or zfs-dkms configure fails with a misleading "CONFIG_MODULES is defined... no"
- name: Install EPEL repository
  ansible.builtin.dnf:
    name: "oracle-epel-release-el{{ ansible_facts['distribution_major_version'] }}"
    state: present
  register: _satellite_install_epel
  until: _satellite_install_epel is succeeded
  retries: 3
  delay: 10

- name: Install ZFS repository
  ansible.builtin.dnf:
    name: "https://zfsonlinux.org/epel/zfs-release-3-0{{ ansible_facts['distribution_version'] | regex_replace('^(\\d+).*', '.el\\1') }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  register: _satellite_install_zfs_repo
  until: _satellite_install_zfs_repo is succeeded
  retries: 3
  delay: 10

- name: Disable ZFS kmod repository
  ansible.builtin.command:
    cmd: dnf config-manager --disable zfs-kmod
  changed_when: false

- name: Enable ZFS DKMS repository
  ansible.builtin.command:
    cmd: dnf config-manager --enable zfs
  changed_when: false

- name: Remove incompatible kmod-zfs package
  ansible.builtin.dnf:
    name: kmod-zfs
    state: absent

- name: Install UEK kernel headers and DKMS prerequisites
  ansible.builtin.dnf:
    name: "{{ (ansible_facts | linbit.common.dkms_kernel_headers) + ['dkms', 'zfs-dkms'] }}"
    state: present
  register: _satellite_install_uek_devel
  until: _satellite_install_uek_devel is succeeded
  retries: 3
  delay: 10

- name: Detect the compiler the UEK kernel was built with
  ansible.builtin.command:
    cmd: grep -oP 'gcc \(GCC\) \K[0-9]+' /lib/modules/{{ ansible_facts['kernel'] }}/build/include/generated/compile.h
  register: _satellite_install_kernel_gcc
  changed_when: false

- name: Detect the system default compiler version
  ansible.builtin.command:
    cmd: gcc -dumpversion
  register: _satellite_install_system_gcc
  changed_when: false
  failed_when: false

- name: Determine whether a matching GCC toolset is needed
  ansible.builtin.set_fact:
    _satellite_install_uek_gcc: "{{ _satellite_install_kernel_gcc.stdout | trim }}"
    _satellite_install_uek_gcc_mismatch: >-
      {{ (_satellite_install_kernel_gcc.stdout | trim)
         != (_satellite_install_system_gcc.stdout | trim) }}

- name: Install GCC toolset matching the UEK kernel build compiler
  ansible.builtin.dnf:
    name: "gcc-toolset-{{ _satellite_install_uek_gcc }}"
    state: present
  when: _satellite_install_uek_gcc_mismatch | bool
  register: _satellite_install_gcc_toolset
  until: _satellite_install_gcc_toolset is succeeded
  retries: 3
  delay: 10

- name: Build ZFS DKMS module
  ansible.builtin.shell:
    cmd: >-
      {% if _satellite_install_uek_gcc_mismatch | bool %}
        source /opt/rh/gcc-toolset-{{ _satellite_install_uek_gcc }}/enable &&
      {% endif %}
      dkms autoinstall
    creates: "/lib/modules/{{ ansible_facts['kernel'] }}/extra/zfs.ko.xz"

- name: Install ZFS utilities
  ansible.builtin.dnf:
    name: zfs
    state: present
  register: _satellite_install_zfs_utils
  until: _satellite_install_zfs_utils is succeeded
  retries: 3
  delay: 10
