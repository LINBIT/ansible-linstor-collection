# SPDX-License-Identifier: MIT
---
# Oracle UEK uses DKMS (kmod repo has no UEK builds); EL8 needs gcc-toolset-11 to match the UEK build compiler.
- name: Install EPEL repository
  ansible.builtin.dnf:
    name: epel-release
    state: present
  register: _satellite_install_epel
  until: _satellite_install_epel is succeeded
  retries: 3
  delay: 10

- name: Install ZFS repository
  ansible.builtin.dnf:
    name: "https://zfsonlinux.org/epel/zfs-release-3-0{{ ansible_facts['distribution_version'] | regex_replace('^(\\d+).*', '.el\\1') }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  register: _satellite_install_zfs_repo
  until: _satellite_install_zfs_repo is succeeded
  retries: 3
  delay: 10

- name: Disable ZFS kmod repository
  ansible.builtin.command:
    cmd: dnf config-manager --disable zfs-kmod
  changed_when: false

- name: Enable ZFS DKMS repository
  ansible.builtin.command:
    cmd: dnf config-manager --enable zfs
  changed_when: false

- name: Remove incompatible kmod-zfs package
  ansible.builtin.dnf:
    name: kmod-zfs
    state: absent

- name: Install GCC toolset matching UEK build compiler (EL8)
  ansible.builtin.dnf:
    name: gcc-toolset-11
    state: present
  when: ansible_facts['distribution_major_version'] == '8'
  register: _satellite_install_gcc_toolset
  until: _satellite_install_gcc_toolset is succeeded
  retries: 3
  delay: 10

- name: Install UEK kernel headers and DKMS prerequisites
  ansible.builtin.dnf:
    name:
      - kernel-uek-devel
      - dkms
      - zfs-dkms
    state: present
  register: _satellite_install_uek_devel
  until: _satellite_install_uek_devel is succeeded
  retries: 3
  delay: 10

- name: Build ZFS DKMS module with GCC toolset (EL8)
  ansible.builtin.shell:
    cmd: source /opt/rh/gcc-toolset-11/enable && dkms install zfs/$(rpm -q --qf '%{VERSION}' zfs-dkms)
    creates: "/lib/modules/{{ ansible_facts['kernel'] }}/extra/zfs.ko.xz"
  when: ansible_facts['distribution_major_version'] == '8'

- name: Build ZFS DKMS module (EL9+)
  ansible.builtin.command:
    cmd: dkms install zfs/$(rpm -q --qf '%{VERSION}' zfs-dkms)
    creates: "/lib/modules/{{ ansible_facts['kernel'] }}/extra/zfs.ko.xz"
  when: ansible_facts['distribution_major_version'] != '8'

- name: Install ZFS utilities
  ansible.builtin.dnf:
    name: zfs
    state: present
  register: _satellite_install_zfs_utils
  until: _satellite_install_zfs_utils is succeeded
  retries: 3
  delay: 10
