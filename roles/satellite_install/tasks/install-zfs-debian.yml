# SPDX-License-Identifier: MIT
---
- name: Install gpg for repository management
  ansible.builtin.package:
    name: gpg
    state: present
  register: _satellite_install_gpg
  until: _satellite_install_gpg is succeeded
  retries: 3
  delay: 10

- name: Enable Debian contrib repository for ZFS
  ansible.builtin.deb822_repository:
    name: debian-contrib
    uris: http://deb.debian.org/debian
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: contrib
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg
  register: _satellite_install_contrib_repo

- name: Enable Debian backports repository for ZFS
  ansible.builtin.deb822_repository:
    name: debian-backports
    uris: http://deb.debian.org/debian
    suites: "{{ ansible_facts['distribution_release'] }}-backports"
    components: contrib
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg
  register: _satellite_install_backports_repo

- name: Update apt cache after enabling repos  # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  when:
    - _satellite_install_contrib_repo is changed
      or _satellite_install_backports_repo is changed
  register: _satellite_install_apt_update
  until: _satellite_install_apt_update is succeeded
  retries: 3
  delay: 10

- name: Install kernel headers for ZFS DKMS
  ansible.builtin.package:
    name: "linux-headers-{{ _debian_arch }}"
    state: present
  vars:
    _debian_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"
  register: _satellite_install_kernel_headers
  until: _satellite_install_kernel_headers is succeeded
  retries: 3
  delay: 10

- name: Install ZFS packages (APT)
  ansible.builtin.apt:
    name:
      - zfsutils-linux
      - zfs-dkms
    state: present
    default_release: "{{ ansible_facts['distribution_release'] }}-backports"
  register: _satellite_install_zfs_apt
  until: _satellite_install_zfs_apt is succeeded
  retries: 3
  delay: 10
