---
- name: Install gpg for repository management
  ansible.builtin.package:
    name: gpg
    state: present

- name: Enable Debian contrib repository for ZFS
  ansible.builtin.deb822_repository:
    name: debian-contrib
    uris: http://deb.debian.org/debian
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: contrib
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg
  register: _satellite_install_contrib_repo

- name: Update apt cache after enabling contrib  # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  when: _satellite_install_contrib_repo is changed
