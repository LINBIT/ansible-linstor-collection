---
# handlers file for linstor_satellite
# Should handle "OS updates" use case, restart on package updates only
- name: Enable and start LINSTOR satellite service
  ansible.builtin.systemd:
    name: linstor-satellite.service
    state: "{{ 'restarted' if satellite_install_package_state == 'latest' else 'started' }}"
    enabled: true
  listen: sat_package_update

- name: Read satellite TOML config
  ansible.builtin.slurp:
    src: /etc/linstor/linstor_satellite.toml
  register: _sat_toml
  failed_when: false
  changed_when: false
  listen: sat_package_update

- name: Wait for LINSTOR satellite port
  ansible.builtin.wait_for:
    host: localhost
    port: "{{ 3367 if (_sat_toml.content | default('') | b64decode) is search('type.*ssl') else 3366 }}"
    timeout: 30
  listen: sat_package_update
