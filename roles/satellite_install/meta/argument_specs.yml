# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Install and configure LINSTOR satellite nodes
    description:
      - Install and configure LINSTOR satellite nodes.
      - Opens firewall ports C(3366-3367/tcp) and C(7000-8000/tcp).
    options:
      satellite_install_package_state:
        type: str
        default: present
        choices:
          - latest
          - present
        description:
          - Package state for LINSTOR satellite packages.
          - Set C(latest) to check for upgrades.
      satellite_install_firewall_rules:
        type: bool
        default: true
        description:
          - Manage firewall rules for LINSTOR satellite ports.
          - Set C(false) to skip firewall configuration.
      satellite_install_zfs:
        type: bool
        default: false
        description:
          - Install ZFS on Debian (non-Ubuntu, non-Proxmox), Red Hat, and SUSE family nodes.
          - >-
            Ubuntu always installs C(zfsutils-linux) as a prerequisite, regardless of this setting (userspace
            only, no DKMS).
          - Proxmox VE ships with ZFS and needs no additional packages.
          - >-
            Disabled by default because the Red Hat and SUSE paths involve DKMS or kmod package installs that
            can be slow and kernel-sensitive.
          - >-
            LINBIT does not support ZFS on non-Debian family operating systems, use for testing purposes or
            at your own risk.
      satellite_install_packages:
        type: list
        elements: str
        default:
          - cryptsetup
          - socat
          - lvm2
          - thin-send-recv
          - zstd
          - linstor-satellite
        description:
          - Packages to install for the LINSTOR satellite.
          - Override to add or remove packages for unusual distributions.
      satellite_install_firewall_ports:
        type: list
        elements: dict
        default:
          - port: "3366-3367"
            proto: tcp
          - port: "7000-8000"
            proto: tcp
        description:
          - Ports to open in firewalld or UFW for the LINSTOR satellite.
      satellite_install_force_reconfigure:
        type: bool
        default: false
        description:
          - Force re-running the configure phase even when the LINSTOR
            satellite package install reports unchanged.
          - Re-asserts firewall ports and the LVM C(global_filter) for DRBD
            devices in C(/etc/lvm/lvm.conf).
          - Use for drift correction after the LVM filter is cleared or the
            satellite TOML drifts out-of-band.
