# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Create LINSTOR storage pools on diskful satellites
    description:
      - Create LINSTOR storage pools on diskful satellite nodes.
      - Supports all LINSTOR storage pool driver types.
      - >-
        The role loops over the C(linstor_storage_pools) inventory variable and creates the underlying
        storage before registering each pool with LINSTOR.
      - >-
        Each satellite creates the pools that target it; a satellite no pool targets is left diskless.
    options:
      linstor_storage_pools:
        type: list
        elements: dict
        default: []
        description:
          - List of pool definitions, typically defined in inventory.
          - >-
            Each item supports keys: C(name) (required), C(type), C(vg), C(vg_thinpool), C(zpool),
            C(physical_devices), C(file_path), C(thinpool_size), C(pv_create_options), C(lv_create_options),
            C(zfs_create_options), C(zpool_vdev_type), C(zpool_properties), C(wipefs_force).
          - >-
            Optional targeting keys: C(nodes) (list of inventory hostnames) and C(groups) (list of inventory
            group names). When set, the pool is created only on hosts that match. When both are set, the
            union is used. When neither is set, the pool targets all C(linstor_satellites).
      storage_pool_defaults:
        type: dict
        description:
          - Dict providing fallback values for omitted keys in each pool item.
          - Override this dict to change defaults globally.
          - See C(defaults/main.yml) for the full default dict.
      linstor_api_delegate:
        type: str
        required: false
        default: localhost
        description:
          - Delegation target for LINSTOR API tasks (python-linstor module calls).
          - Default C(localhost) runs the calls on the Ansible control node.
          - Override to a cluster node when the control node cannot reach the
            controller API endpoint directly (SSH jump host, segmented
            management network).
          - "Common override: the first host in the C(linstor_controllers) inventory group."
          - The delegated node must have C(python-linstor) installed.
            Cluster nodes have it via LINSTOR package dependencies.
