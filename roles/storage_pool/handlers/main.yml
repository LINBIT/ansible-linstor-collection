---
- name: Restart linstor-satellite.service for new storage
  ansible.builtin.systemd_service:
    service: linstor-satellite.service
    state: restarted
  listen: storage_pool_restart_satellite

- name: Check for satellite on non-SSL port
  ansible.builtin.wait_for:
    port: 3366
    delay: 10
    timeout: 30
  register: _sp_non_ssl_port
  ignore_errors: true
  listen: storage_pool_restart_satellite
  when:
    - inventory_hostname in groups.get('linstor_satellites', [])
    - not (cluster_init_ssl | default(false) | bool)

# Fallback to SSL port when non-SSL check was skipped or failed
- name: Wait for satellite on SSL port
  ansible.builtin.wait_for:
    port: 3367
    delay: 10
    timeout: 30
  listen: storage_pool_restart_satellite
  when:
    - inventory_hostname in groups.get('linstor_satellites', [])
    - _sp_non_ssl_port is not succeeded

- name: Wait for satellite to be ONLINE after restart
  linbit.linstor.node:
    name: "{{ linstor_hostname }}"
    state: query
  register: _sp_satellite_status
  until: _sp_satellite_status.connection_status | default('') == 'ONLINE'
  retries: 6
  delay: 5
  delegate_to: "{{ groups['linstor_controllers'][0] }}"
  listen: storage_pool_restart_satellite
  when:
    - groups.get('linstor_controllers', []) | length > 0
    - inventory_hostname in groups.get('linstor_satellites', [])
