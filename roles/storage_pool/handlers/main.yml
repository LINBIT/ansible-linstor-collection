---
- name: Restart linstor-satellite.service for new storage
  ansible.builtin.systemd_service:
    service: linstor-satellite.service
    state: restarted
  listen: storage_pool_restart_satellite

- name: Read satellite TOML config
  ansible.builtin.slurp:
    src: /etc/linstor/linstor_satellite.toml
  register: _sp_toml
  failed_when: false
  changed_when: false
  listen: storage_pool_restart_satellite
  when: inventory_hostname in groups.get('linstor_satellites', [])

# 12 second delay ensures node is listed ONLINE after restart
- name: Wait for LINSTOR satellite port
  ansible.builtin.wait_for:
    port: "{{ 3367 if (_sp_toml.content | default('') | b64decode) is search('type.*ssl') else 3366 }}"
    delay: 12
    timeout: 30
  listen: storage_pool_restart_satellite
  when: inventory_hostname in groups.get('linstor_satellites', [])

- name: Wait for satellite to be ONLINE after restart
  linbit.linstor.node:
    name: "{{ inventory_hostname }}"
    state: query
  register: _sp_satellite_status
  until: _sp_satellite_status.connection_status | default('') == 'ONLINE'
  retries: 9
  delay: 5
  delegate_to: "{{ groups['linstor_controllers'][0] }}"
  listen: storage_pool_restart_satellite
  when:
    - groups.get('linstor_controllers', []) | length > 0
    - inventory_hostname in groups.get('linstor_satellites', [])
