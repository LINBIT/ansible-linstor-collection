# SPDX-License-Identifier: MIT
---
# Filter pools for this host. Pools without nodes/groups keys apply unconditionally.
# Pools with nodes and/or groups keys apply only when the current host is listed
# in nodes or is a member of one of the listed inventory groups (union).
- name: Filter pools for this host
  ansible.builtin.set_fact:
    _my_pools: >-
      {%- set result = [] -%}
      {%- for pool in linstor_storage_pools | default([]) -%}
        {%- if pool.nodes is not defined and pool.groups is not defined -%}
          {%- set _ = result.append(pool) -%}
        {%- else -%}
          {%- set ns = namespace(targets=pool.nodes | default([])) -%}
          {%- for grp in pool.groups | default([]) -%}
            {%- set ns.targets = ns.targets + groups.get(grp, []) -%}
          {%- endfor -%}
          {%- if inventory_hostname in ns.targets | unique -%}
            {%- set _ = result.append(pool) -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}

- name: Check if storage pool exists
  linbit.linstor.storage_pool:
    name: "{{ _pool.name }}"
    node: "{{ inventory_hostname }}"
    state: query
  when: _storage_pool_is_diskful | bool
  delegate_to: localhost
  become: false
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
  loop: "{{ _my_pools }}"
  loop_control:
    loop_var: _pool
    label: "{{ _pool.name }}"
  register: _storage_pool_checks

# Build enriched list with computed _type for downstream filtering.
# Using a loop with set_fact so each host builds its own list in parallel.
- name: Initialize pool creation list
  ansible.builtin.set_fact:
    _pools_to_create: []
  when: _storage_pool_is_diskful | bool

- name: Build pool creation list
  ansible.builtin.set_fact:
    _pools_to_create: >-
      {{ _pools_to_create +
         [_check._pool | combine({
           '_type': _check._pool.type | default(storage_pool_defaults.type)
         })] }}
  when:
    - _storage_pool_is_diskful | bool
    - not (_check.exists | default(false))
  loop: "{{ _storage_pool_checks.results | default([]) }}"
  loop_control:
    loop_var: _check
    label: "{{ _check._pool.name }}"

# --- Validation ---

- name: Assert pool name is set
  ansible.builtin.assert:
    that: item.name is defined and item.name | length > 0
    fail_msg: "Each storage pool must have a 'name' key"
    quiet: true
  when: _storage_pool_is_diskful | bool
  loop: "{{ _pools_to_create | default([]) }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"

- name: Assert pool type is valid
  ansible.builtin.assert:
    that: item._type in ['lvm', 'lvmthin', 'zfs', 'zfsthin', 'file', 'filethin', 'spdk', 'remote_spdk']
    fail_msg: "storage pool type '{{ item._type }}' is not a valid LINSTOR storage pool driver"
    quiet: true
  when: _storage_pool_is_diskful | bool
  loop: "{{ _pools_to_create | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Assert physical_devices is set
  ansible.builtin.assert:
    that: item.physical_devices is defined and item.physical_devices | length > 0
    fail_msg: "physical_devices must be set for type '{{ item._type }}'"
    quiet: true
  when:
    - _storage_pool_is_diskful | bool
    - item._type not in ['file', 'filethin']
  loop: "{{ _pools_to_create | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Assert vg is set
  ansible.builtin.assert:
    that: item.vg is defined and item.vg | length > 0
    fail_msg: "vg must be set for type '{{ item._type }}'"
    quiet: true
  when:
    - _storage_pool_is_diskful | bool
    - item._type in ['lvm', 'lvmthin']
  loop: "{{ _pools_to_create | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Assert zpool is set
  ansible.builtin.assert:
    that: item.zpool is defined and item.zpool | length > 0
    fail_msg: "zpool must be set for type '{{ item._type }}'"
    quiet: true
  when:
    - _storage_pool_is_diskful | bool
    - item._type in ['zfs', 'zfsthin']
  loop: "{{ _pools_to_create | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Assert vg_thinpool is set
  ansible.builtin.assert:
    that: (item.vg_thinpool | default(storage_pool_defaults.vg_thinpool)) | length > 0
    fail_msg: "vg_thinpool must be set for type 'lvmthin'"
    quiet: true
  when:
    - _storage_pool_is_diskful | bool
    - item._type == 'lvmthin'
  loop: "{{ _pools_to_create | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

# --- ZFS prerequisites ---

- name: Check for ZFS
  ansible.builtin.stat:
    path: "{{ _storage_pool_zfs_path }}"
  when:
    - _storage_pool_is_diskful | bool
    - _pools_to_create | default([]) | selectattr('_type', 'in', ['zfs', 'zfsthin']) | list | length > 0
  register: _storage_pool_zfs_check

- name: Halt if ZFS is not installed
  ansible.builtin.fail:
    msg: >-
      ZFS is not installed ({{ _storage_pool_zfs_path }} not found).
      Install ZFS for ZFS-backed storage pools, or set
      `satellite_install_zfs: true` in linbit.linstor.satellite_install.
  when:
    - _storage_pool_is_diskful | bool
    - _pools_to_create | default([]) | selectattr('_type', 'in', ['zfs', 'zfsthin']) | list | length > 0
    - not (_storage_pool_zfs_check.stat.exists | default(true))

# --- Create storage backends ---
# Each type file loops internally over the relevant pools from _pools_to_create.
# This allows all hosts to execute each task in parallel (no include_tasks loop).

- name: Create file storage pools
  ansible.builtin.include_tasks: file.yml
  when:
    - _storage_pool_is_diskful | bool
    - _pools_to_create | default([]) | selectattr('_type', 'in', ['file', 'filethin']) | list | length > 0

- name: Create LVM storage pools
  ansible.builtin.include_tasks: lvm.yml
  when:
    - _storage_pool_is_diskful | bool
    - _pools_to_create | default([]) | selectattr('_type', 'in', ['lvm', 'lvmthin']) | list | length > 0

- name: Create ZFS storage pools
  ansible.builtin.include_tasks: zfs.yml
  when:
    - _storage_pool_is_diskful | bool
    - _pools_to_create | default([]) | selectattr('_type', 'in', ['zfs', 'zfsthin']) | list | length > 0

# --- Register pools with LINSTOR ---

- name: Create LINSTOR storage pool
  linbit.linstor.storage_pool:
    name: "{{ item.name }}"
    node: "{{ inventory_hostname }}"
    driver: "{{ item._type }}"
    driver_pool: "{{ _sp_driver_pool | trim }}"
    properties: "{{ _sp_properties }}"
  vars:
    _sp_driver_pool: >-
      {{ (item.file_path | default(storage_pool_defaults.file_path))
         if item._type in ['file', 'filethin']
         else (item.vg ~ '/' ~ (item.vg_thinpool | default(storage_pool_defaults.vg_thinpool)))
         if item._type == 'lvmthin'
         else item.zpool
         if item._type in ['zfs', 'zfsthin']
         else item.vg }}
    _sp_custom_opts: "{{ (item.lv_create_options | default(storage_pool_defaults.lv_create_options)) | trim }}"
    _sp_stripe_opts: >-
      {%- if (item.physical_devices | default([]) | length) > 1 -%}
        -i {{ item.physical_devices | default([]) | length }} -I 64
      {%- endif -%}
    _sp_lv_opts: "{{ _sp_custom_opts or _sp_stripe_opts }}"
    _sp_properties: >-
      {{ {}
        | combine({'StorDriver/LvcreateOptions': _sp_lv_opts}
          if item._type == 'lvm' and _sp_lv_opts else {})
        | combine({'StorDriver/ZfscreateOptions': (item.zfs_create_options
          | default(storage_pool_defaults.zfs_create_options)) | trim}
          if item._type in ['zfs', 'zfsthin'] and (item.zfs_create_options
          | default(storage_pool_defaults.zfs_create_options)) | trim != '' else {})
      }}
  when: _storage_pool_is_diskful | bool
  delegate_to: localhost
  become: false
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
  loop: "{{ _pools_to_create | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  retries: 3
  delay: 5
