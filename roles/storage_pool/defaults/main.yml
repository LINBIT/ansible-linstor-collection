---
# The role reads linstor_storage_pools from inventory (list of pool dicts).
# Default: empty list (skips if undefined).
#
# Optional targeting keys per pool entry:
#   nodes: list of inventory_hostname values (pool applies only to listed nodes)
#   groups: list of inventory group names (pool applies to all group members)
# When both are set, the union of nodes and group members is used.
# When neither is set, the pool applies to every host that sees the variable.
storage_pool_defaults:
  type: lvmthin
  vg_thinpool: thinpool
  file_path: '/var/lib/linstor-filethin/'
  thinpool_size: '95%VG'
  pv_create_options: ""
  lv_create_options: ""
  zfs_create_options: ""
  zpool_vdev_type: stripe
  zpool_properties: {}
  wipefs_force: false

# Node hostname for LINSTOR storage pool registration.
# Forces short hostnames on Proxmox VE (detected via PVE kernel or proxmox-ve package).
linstor_hostname: "{{ ansible_facts | linbit.linstor.pve_hostname(inventory_hostname) }}"
