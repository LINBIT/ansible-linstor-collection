---
# The role reads linstor_storage_pools from inventory (list of pool dicts).
# Default: empty list (skips if undefined).
storage_pool_defaults:
  type: lvmthin
  vg_thinpool: thinpool
  file_path: '/var/lib/linstor-filethin/'
  thinpool_size: '95%VG'
  pv_create_options: ""
  lv_create_options: ""
  zfs_create_options: ""
  zpool_vdev_type: stripe
  zpool_properties: {}
  wipefs_force: false

# Node hostname for LINSTOR storage pool registration.
# Forces short hostnames on Proxmox VE (detected via kernel version), unaltered otherwise.
linstor_hostname: >-
  {{
    inventory_hostname_short
    if 'pve' in ansible_facts['kernel']
    else inventory_hostname
  }}

# Computed (private)
_storage_pool_is_diskful: "{{ inventory_hostname in groups.get('linstor_diskful_satellites', []) }}"
