---
linstor_controller_vip: "{{ linstor_ha_vip.split('/')[0] if linstor_ha_vip | default('') else '' }}"

storage_pool_defaults:
  type: lvmthin
  vg_thinpool: thinpool
  file_path: '/var/lib/linstor-filethin/'
  thinpool_size: '95%VG'
  pv_create_options: ""
  lv_create_options: ""
  zfs_create_options: ""
  zpool_vdev_type: stripe
  zpool_properties: {}
  wipefs_force: false
