---
# Fetch the IPaddr2 OCF resource agent from GitHub when not already installed
- name: Check for IPaddr2 resource agent
  ansible.builtin.stat:
    path: "{{ _ha_db_ocf_path }}/IPaddr2"
  register: _ha_db_ipaddr2_check

- name: Create OCF resource agent directory
  ansible.builtin.file:
    path: "{{ _ha_db_ocf_path }}"
    state: directory
    mode: "0755"
  when: not _ha_db_ipaddr2_check.stat.exists

- name: Download IPaddr2 resource agent
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/ClusterLabs/resource-agents/main/heartbeat/IPaddr2
    dest: "{{ _ha_db_ocf_path }}/IPaddr2"
    mode: "0755"
  when: not _ha_db_ipaddr2_check.stat.exists
