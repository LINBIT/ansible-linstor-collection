# SPDX-License-Identifier: MIT
---
- name: Validate inventory topology for HA database
  ansible.builtin.include_tasks: ha-readiness.yml

# Only valid for 2 combined nodes + TieBreaker satellite topology
- name: Select TieBreaker satellite for HA database quorum
  ansible.builtin.set_fact:
    _ha_db_tiebreaker: >-
      {{ ha_database_tiebreaker_node | default(_ha_db_random_satellite, true) }}
  vars:
    _ha_db_random_satellite: >-
      {{ (groups['linstor_satellites'] | difference(groups['linstor_controllers']) | shuffle | first) | default('', true) }}
  when: _ha_db_combined_nodes | length == 2
  run_once: true # noqa: run-once[task]

- name: Build HA database placement node list
  ansible.builtin.set_fact:
    _ha_db_placement_nodes: >-
      {%- if _ha_db_tiebreaker | default('') != '' -%}
        {{ _ha_db_combined_nodes + [_ha_db_tiebreaker] }}
      {%- else -%}
        {{ _ha_db_combined_nodes }}
      {%- endif -%}
  run_once: true # noqa: run-once[task]

- name: Install DRBD Reactor
  ansible.builtin.include_role:
    name: linbit.drbd_reactor.reactor_install
  vars:
    reactor_install_drbd: false # skip DRBD install, already present
    reactor_install_resource_agents_github: true
  when: inventory_hostname in _ha_db_placement_nodes

# LINSTOR node properties (informational aux prop on combined nodes)
- name: Set ControllerIsHA on combined controller nodes
  linbit.linstor.node:
    name: "{{ linstor_hostname }}"
    aux_properties:
      ControllerIsHA: "True"
  delegate_to: "{{ _ha_db_primary_node }}"
  when: inventory_hostname in _ha_db_combined_nodes

- name: Tag nodes for HA database placement
  linbit.linstor.node:
    name: "{{ item.split('.')[0] if short_hostnames | bool else item }}"
    aux_properties:
      ha-database-node: "True"
  delegate_to: "{{ _ha_db_primary_node }}"
  loop: "{{ _ha_db_placement_nodes }}"
  run_once: true # noqa: run-once[task]

# If storage_pool is omitted, LINSTOR auto-selects from available pools
- name: Create HA database resource group
  linbit.linstor.resource_group:
    name: "{{ ha_database_rg }}"
    storage_pool: "{{ ha_database_pool | default(omit, true) }}"
    place_count: "{{ _ha_db_combined_nodes | length }}"
    replicas_on_same:
      - "Aux/ha-database-node=True"
    drbd_options: "{{ ha_database_drbd_options }}"
  run_once: true  # noqa: run-once[task]

- name: Create resource for HA database
  linbit.linstor.resource:
    name: "{{ ha_database_res }}"
    mode: spawn
    resource_group: "{{ ha_database_rg }}"
    size: "{{ ha_database_res_size }}"
  run_once: true  # noqa: run-once[task]

# Database migration
- name: Ensure DRBD Reactor is stopped
  ansible.builtin.systemd:
    name: drbd-reactor.service
    state: stopped
  when: inventory_hostname in _ha_db_placement_nodes

- name: Stop the LINSTOR controller service
  ansible.builtin.systemd:
    name: linstor-controller
    state: stopped
    enabled: false
  when: inventory_hostname in _ha_db_combined_nodes

- name: Backup original LINSTOR database
  ansible.builtin.shell: |
    mv /var/lib/linstor /var/lib/linstor.orig
  changed_when: true
  when: inventory_hostname in _ha_db_combined_nodes

- name: Create HA database mountpoint
  ansible.builtin.file:
    path: /var/lib/linstor
    state: directory
    owner: root
    group: root
    mode: '0750'
    attributes: '+i'
  when: inventory_hostname in _ha_db_combined_nodes

- name: Promote HA database resource
  ansible.builtin.shell: |
    drbdadm primary {{ ha_database_res }}
  register: _ha_db_conversion_promote_result
  changed_when: _ha_db_conversion_promote_result.rc == 0
  when: inventory_hostname == _ha_db_primary_node

- name: Create new filesystem for HA database
  community.general.filesystem:
    fstype: ext4
    dev: "/dev/drbd/by-res/{{ ha_database_res }}/0"
  when: inventory_hostname == _ha_db_primary_node

- name: Create HA database mount unit
  ansible.builtin.template:
    src: var-lib-linstor.j2
    dest: /etc/systemd/system/var-lib-linstor.mount
    owner: root
    group: root
    mode: '0644'
  when: inventory_hostname in _ha_db_combined_nodes

- name: Start the HA database mount
  ansible.builtin.systemd:
    name: var-lib-linstor.mount
    state: started
  when: inventory_hostname == _ha_db_primary_node

- name: Copy LINSTOR database to HA storage
  ansible.builtin.copy:
    src: /var/lib/linstor.orig/
    dest: /var/lib/linstor/
    remote_src: true
    mode: preserve
  when: inventory_hostname == _ha_db_primary_node

- name: Create DRBD Reactor config for HA database
  ansible.builtin.template:
    src: linstor_ha_promoter_config.j2
    dest: /etc/drbd-reactor.d/linstor_db.toml
    owner: root
    group: root
    mode: '0644'
  when: inventory_hostname in _ha_db_placement_nodes

# Start linstor-controller.service via DRBD Reactor
- name: Enable and start DRBD Reactor on primary node
  ansible.builtin.systemd:
    name: drbd-reactor.service
    daemon_reload: true
    state: restarted
    enabled: true
  when: inventory_hostname == _ha_db_primary_node

- name: Verify linstor_db resource has promoted successfuly
  ansible.builtin.command:
    cmd: drbd-reactorctl status {{ ha_database_res }}
  register: _ha_db_reactor_status
  until: "'currently active on this node' in _ha_db_reactor_status.stdout"
  retries: 10
  delay: 3
  changed_when: false
  when: inventory_hostname == _ha_db_primary_node

- name: Wait for LINSTOR controller to be ready
  ansible.builtin.wait_for:
    port: 3370
    timeout: 30
  when: inventory_hostname == _ha_db_primary_node

- name: Enable and start DRBD Reactor on remaining nodes
  ansible.builtin.systemd:
    name: drbd-reactor.service
    daemon_reload: true
    state: restarted
    enabled: true
  when:
    - inventory_hostname in _ha_db_placement_nodes
    - inventory_hostname != _ha_db_primary_node

# Mark migration as completed (cluster-wide property)
- name: Record aux prop to mark migration as completed
  linbit.linstor.controller:
    aux_properties: >-
      {%- if ha_database_vip | default('') != '' -%}
        {{ {'ClusterIsHA': 'True', 'ha_database_vip': _ha_db_vip_address} }}
      {%- else -%}
        {{ {'ClusterIsHA': 'True'} }}
      {%- endif -%}
  when: inventory_hostname in _ha_db_placement_nodes
  run_once: true # noqa: run-once[task]

# Update linstor-client.conf to use VIP on all cluster nodes
- name: Update linstor-client.conf to use HA VIP
  ansible.builtin.copy:
    content: |
      [global]
      controllers={{ _ha_db_vip_address }}
    dest: /etc/linstor/linstor-client.conf
    owner: root
    group: root
    mode: '0644'
  when: ha_database_vip | default('') != ''
