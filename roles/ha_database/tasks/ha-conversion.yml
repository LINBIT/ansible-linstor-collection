---
- name: Validate inventory topology for HA database
  ansible.builtin.include_tasks: ha-readiness.yml

- name: Verify the requested HA database storage pool exists on the combined nodes
  ansible.builtin.assert:
    that: _ha_db_pool_nodes | length == _ha_db_combined_nodes | length
    fail_msg: >-
      Storage pool '{{ ha_database_pool }}' is not a diskful pool on every
      combined node ({{ _ha_db_combined_nodes | join(', ') }}).
      Found on: {{ _ha_db_pool_nodes | join(', ') | default('no nodes', true) }}.
    quiet: true
  when: ha_database_pool | length > 0
  run_once: true  # noqa: run-once[task]

- name: Note auto-selected storage pool when multiple pools exist
  ansible.builtin.debug:
    msg: >-
      Multiple storage pools exist on the combined nodes
      ({{ _ha_db_pool_names | join(', ') }}).
      Auto-selected '{{ _ha_db_pool }}' - set ha_database_pool to override.
  when:
    - ha_database_pool | length == 0
    - _ha_db_pool_names | length > 1
  run_once: true  # noqa: run-once[task]

# DRBD Reactor package (idempotent); OCF agents handled separately below
- name: Install DRBD Reactor
  ansible.builtin.include_role:
    name: linbit.drbd_reactor.reactor_install
  vars:
    reactor_install_drbd: false # skip DRBD install, already present
    reactor_install_resource_agents_upstream: false
  when: inventory_hostname in _ha_db_combined_nodes

# Only necessary when using ha_database_vip
- name: Check for IPaddr2 resource agent
  ansible.builtin.stat:
    path: "{{ _ha_db_ipaddr2_path }}"
  when:
    - ha_database_vip | default('') != ''
    - inventory_hostname in _ha_db_combined_nodes
  register: _ha_db_ipaddr2_check

- name: Install IPaddr2 OCF resource agent for virtual IP address
  ansible.builtin.include_role:
    name: linbit.drbd_reactor.resource_agents_upstream
  vars:
    resource_agents_upstream_list:
      - IPaddr2
  when:
    - ha_database_vip | default('') != ''
    - inventory_hostname in _ha_db_combined_nodes
    - not (_ha_db_ipaddr2_check.stat.exists | default(false))

- name: Set ControllerIsHA on combined controller nodes
  linbit.linstor.node:
    name: "{{ inventory_hostname }}"
    aux_properties:
      ControllerIsHA: "True"
  when: inventory_hostname in _ha_db_combined_nodes
  delegate_to: "{{ linstor_api_delegate }}"
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
  throttle: 1

- name: Create HA database resource group
  linbit.linstor.resource_group:
    name: "{{ ha_database_rg }}"
    storage_pool: "{{ _ha_db_pool }}"
    place_count: "{{ _ha_db_combined_nodes | length }}"
    drbd_options: "{{ ha_database_drbd_options }}"
  delegate_to: "{{ linstor_api_delegate }}"
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
  run_once: true  # noqa: run-once[task]

# 3 combined nodes - diskful placement on every combined node
# 2 combined nodes - auto-quorum adds a diskless TieBreaker automatically
- name: Place HA database resource on combined nodes
  linbit.linstor.resource:
    name: "{{ ha_database_res }}"
    mode: manual
    resource_group: "{{ ha_database_rg }}"
    sizes:
      - "{{ ha_database_res_size }}"
    nodes: "{{ _ha_db_placement_nodes }}"
    storage_pool: "{{ _ha_db_pool }}"
  delegate_to: "{{ linstor_api_delegate }}"
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
  run_once: true  # noqa: run-once[task]

- name: Wait for HA database resource to be Connected with all peers
  ansible.builtin.command:
    cmd: drbdadm cstate {{ ha_database_res }}
  when: inventory_hostname in _ha_db_combined_nodes
  register: _ha_db_drbd_cstate
  until:
    - _ha_db_drbd_cstate.stdout_lines | length > 0
    - _ha_db_drbd_cstate.stdout_lines | reject('equalto', 'Connected') | list | length == 0
  retries: 30
  delay: 2
  changed_when: false

- name: Wait for HA database resource to be UpToDate on all diskful nodes
  ansible.builtin.command:
    cmd: drbdadm dstate {{ ha_database_res }}
  when: inventory_hostname in _ha_db_combined_nodes
  register: _ha_db_drbd_dstate
  until: _ha_db_drbd_dstate.stdout.count('UpToDate') == _ha_db_combined_nodes | length
  retries: 30
  delay: 2
  changed_when: false

# Database migration
- name: Ensure DRBD Reactor is stopped
  ansible.builtin.systemd:
    name: drbd-reactor.service
    state: stopped
  when: inventory_hostname in _ha_db_combined_nodes

- name: Stop the LINSTOR controller service
  ansible.builtin.systemd:
    name: linstor-controller
    state: stopped
    enabled: false
  when: inventory_hostname in _ha_db_combined_nodes

- name: Backup original LINSTOR database
  ansible.builtin.command:
    cmd: mv /var/lib/linstor /var/lib/linstor.orig
    removes: /var/lib/linstor
  when: inventory_hostname == _ha_db_primary_node

- name: Create HA database mountpoint
  ansible.builtin.file:
    path: /var/lib/linstor
    state: directory
    owner: root
    group: root
    mode: '0750'
  when: inventory_hostname in _ha_db_combined_nodes

- name: Promote HA database resource
  ansible.builtin.command:
    cmd: drbdadm primary {{ ha_database_res }}
  when: inventory_hostname == _ha_db_primary_node
  register: _ha_db_conversion_promote_result
  changed_when: _ha_db_conversion_promote_result.rc == 0

- name: Create new filesystem for HA database
  community.general.filesystem:
    fstype: "{{ ha_database_filesystem }}"
    dev: "/dev/drbd/by-res/{{ ha_database_res }}/0"
    opts: "{{ _ha_db_mkfs_opts | default('') }}"
  when: inventory_hostname == _ha_db_primary_node

- name: Create HA database mount unit
  ansible.builtin.template:
    src: var-lib-linstor.j2
    dest: /etc/systemd/system/var-lib-linstor.mount
    owner: root
    group: root
    mode: '0644'
  when: inventory_hostname in _ha_db_combined_nodes

- name: Start the HA database mount
  ansible.builtin.systemd:
    name: var-lib-linstor.mount
    state: started
  when: inventory_hostname == _ha_db_primary_node

- name: Copy LINSTOR database to HA storage
  ansible.builtin.copy:
    src: /var/lib/linstor.orig/
    dest: /var/lib/linstor/
    remote_src: true
    mode: preserve
  when: inventory_hostname == _ha_db_primary_node

- name: Create DRBD Reactor config for HA database
  ansible.builtin.template:
    src: linstor_ha_promoter_config.j2
    dest: /etc/drbd-reactor.d/linstor_db.toml
    owner: root
    group: root
    mode: '0644'
  when: inventory_hostname in _ha_db_combined_nodes

# Start linstor-controller.service via DRBD Reactor
- name: Enable and start DRBD Reactor on primary node
  ansible.builtin.systemd:
    name: drbd-reactor.service
    daemon_reload: true
    state: restarted
    enabled: true
  when: inventory_hostname == _ha_db_primary_node

- name: Verify linstor_db resource has promoted successfully
  ansible.builtin.command:
    cmd: drbd-reactorctl status {{ ha_database_res }}
  when: inventory_hostname == _ha_db_primary_node
  register: _ha_db_reactor_status
  until: "'currently active on this node' in _ha_db_reactor_status.stdout"
  retries: 10
  delay: 3
  changed_when: false

- name: Wait for LINSTOR controller to be ready
  ansible.builtin.wait_for:
    port: 3370
    timeout: 30
  when: inventory_hostname == _ha_db_primary_node

- name: Enable and start DRBD Reactor on remaining nodes
  ansible.builtin.systemd:
    name: drbd-reactor.service
    daemon_reload: true
    state: restarted
    enabled: true
  when:
    - inventory_hostname in _ha_db_combined_nodes
    - inventory_hostname != _ha_db_primary_node

- name: Verify all DRBD peer connections are still Established after HA pivot
  ansible.builtin.command:
    cmd: drbdadm cstate {{ ha_database_res }}
  when: inventory_hostname in _ha_db_combined_nodes
  register: _ha_db_drbd_cstate_post
  until:
    - _ha_db_drbd_cstate_post.stdout_lines | length > 0
    - _ha_db_drbd_cstate_post.stdout_lines | reject('equalto', 'Connected') | list | length == 0
  retries: 30
  delay: 2
  changed_when: false

- name: Verify HA database resource is still UpToDate everywhere after HA pivot
  ansible.builtin.command:
    cmd: drbdadm dstate {{ ha_database_res }}
  when: inventory_hostname in _ha_db_combined_nodes
  register: _ha_db_drbd_dstate_post
  until: _ha_db_drbd_dstate_post.stdout.count('UpToDate') == _ha_db_combined_nodes | length
  retries: 30
  delay: 2
  changed_when: false

# Mark migration as completed (cluster-wide property)
- name: Record aux prop to mark migration as completed
  linbit.linstor.controller:
    aux_properties: >-
      {%- if ha_database_vip | default('') != '' -%}
        {{ {'ClusterIsHA': 'True', 'ha_database_vip': _ha_db_vip_address} }}
      {%- else -%}
        {{ {'ClusterIsHA': 'True'} }}
      {%- endif -%}
  when: inventory_hostname in _ha_db_combined_nodes
  delegate_to: "{{ linstor_api_delegate }}"
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
  run_once: true  # noqa: run-once[task]

# Update linstor-client.conf to use VIP on all cluster nodes
- name: Update linstor-client.conf to use HA VIP
  ansible.builtin.copy:
    content: |
      [global]
      controllers={{ _ha_db_vip_address }}
    dest: /etc/linstor/linstor-client.conf
    owner: root
    group: root
    mode: '0644'
  when: ha_database_vip | default('') != ''
