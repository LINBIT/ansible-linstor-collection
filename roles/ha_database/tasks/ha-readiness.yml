# SPDX-License-Identifier: MIT
---
# Validate inventory topology before HA database conversion
- name: Verify controller node count
  ansible.builtin.assert:
    that:
      - _ha_db_combined_nodes | length >= 2
      - _ha_db_combined_nodes | length <= ha_database_max_controllers | int
    fail_msg: >
      Please use at least 2, but not more than {{ ha_database_max_controllers }}
      LINSTOR controller nodes for LINSTOR database high-availability
    quiet: true
  run_once: true # noqa: run-once[task]

- name: Check for standalone LINSTOR controller nodes
  ansible.builtin.assert:
    that:
      - (groups['linstor_controllers'] | difference(groups['linstor_satellites'])) | length == 0
    fail_msg: >
      All LINSTOR controller nodes must be combined node types.
    quiet: true
  run_once: true # noqa: run-once[task]

- name: Require 3 combined nodes or explicit opt-in for 2-replica topology
  ansible.builtin.assert:
    that:
      - _ha_db_combined_nodes | length >= 3
        or ha_database_allow_2_replica | bool
        or groups['linstor_diskful_satellites'] | length == 2
    fail_msg: "3+ diskful satellites: use 3 combined nodes, or set ha_database_allow_2_replica=true and rerun playbook"
    quiet: true
  run_once: true # noqa: run-once[task]

- name: Validate ha_database_vip format
  ansible.builtin.assert:
    that:
      - _ha_db_vip_address is regex('^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$')
    fail_msg: "ha_database_vip must be a valid IP address: {{ ha_database_vip }}"
    quiet: true
  run_once: true # noqa: run-once[task]
  when: ha_database_vip | default('') != ''
