---
# Idempotency gate: skip if already converted, fewer than 2 combined nodes,
# or fewer than 3 total satellites (insufficient for quorum)
- name: Check LINSTOR database to see if HA migration is needed
  linbit.linstor.controller:
    state: query
  register: _ha_db_conversion_check
  when: _ha_db_combined_nodes | length >= 2
  run_once: true # noqa: run-once[task]

- name: Determine if HA database conversion is needed
  ansible.builtin.set_fact:
    _ha_db_conversion_needed: >-
      {{ (_ha_db_combined_nodes | length >= 2) and
         (groups['linstor_satellites'] | length >= 3) and
         ((_ha_db_conversion_check.properties['Aux/ClusterIsHA'] | default('')) != 'True') }}
  run_once: true # noqa: run-once[task]

- name: Convert LINSTOR database to HA
  ansible.builtin.include_tasks: ha-conversion.yml
  when: _ha_db_conversion_needed | bool
