---
- name: Assert the linstor_controllers group has at least one host
  ansible.builtin.assert:
    that: groups.get('linstor_controllers', []) | length > 0
    fail_msg: >-
      The linstor_controllers inventory group is empty. Define at least one
      controller host before running ha_database.
    quiet: true
  run_once: true  # noqa: run-once[task]

- name: Gather OS facts for OS-specific vars
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - min
  when: ansible_facts['os_family'] is not defined

- name: Query storage pools to find diskful nodes
  linbit.linstor.storage_pool_info:
  delegate_to: "{{ linstor_api_delegate }}"
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
  register: _ha_db_sp_info

# Idempotency gate: skip if already converted, fewer than 2 combined nodes,
# or fewer than 3 total satellites (insufficient for quorum)
- name: Check LINSTOR database to see if HA migration is needed
  linbit.linstor.controller_info:
  when: _ha_db_combined_nodes | length >= 2
  delegate_to: "{{ linstor_api_delegate }}"
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
  register: _ha_db_conversion_check
  run_once: true  # noqa: run-once[task]

- name: Convert LINSTOR database to HA
  ansible.builtin.include_tasks: ha-conversion.yml
  when: _ha_db_conversion_needed | bool
