---
argument_specs:
  main:
    short_description: Configure HA LINSTOR database with DRBD Reactor
    description:
      - Configure highly available LINSTOR database storage using DRBD replication and DRBD Reactor.
      - >-
        Migrates the LINSTOR database onto a DRBD resource replicated across 2-3 combined controller and
        satellite nodes.
      - "Idempotent: checks the C(Aux/ClusterIsHA) controller property and skips if conversion is already completed."
      - Silently skips when fewer than 2 combined nodes or fewer than 3 total satellites exist.
    options:
      ha_database_pool:
        type: str
        default: ""
        description:
          - Storage pool for the HA database resource.
          - When empty, the role auto-selects the first diskful pool name alphabetically on the combined nodes.
          - An explicitly set pool must exist as a diskful pool on every combined node.
      ha_database_rg:
        type: str
        default: linstor-db-grp
        description:
          - LINSTOR resource group name for the HA database.
      ha_database_res:
        type: str
        default: linstor_db
        description:
          - LINSTOR resource name for the HA database.
      ha_database_res_size:
        type: str
        default: 200M
        description:
          - Size of the HA database resource.
      ha_database_max_controllers:
        type: int
        default: 3
        description:
          - Maximum number of combined controller nodes allowed.
      ha_database_allow_2_replica:
        type: bool
        default: false
        description:
          - Allow 2-combined + tiebreaker topology when 3+ diskful satellites exist.
          - Role fails by default and asks the operator to promote a third node to combined for full data redundancy.
          - Set C(true) to opt in; ignored when only 2 diskful satellites exist.
      ha_database_vip:
        type: str
        default: ""
        description:
          - Virtual IP for the HA controller in CIDR notation (for example C(10.0.0.100/24)).
          - DRBD Reactor floats an IPaddr2 resource with the active controller.
          - The IP is stored as C(Aux/ha_database_vip) so C(client_install) discovers it on subsequent runs.
          - Defaults to C(/24) if no CIDR is given.
      ha_database_drbd_options:
        type: dict
        description:
          - DRBD options applied to the HA database resource group.
          - See C(defaults/main.yml) for the default options.
      linstor_api_delegate:
        type: str
        required: false
        default: localhost
        description:
          - Delegation target for LINSTOR API tasks (python-linstor module calls).
          - Default C(localhost) runs the calls on the Ansible control node.
          - Override to a cluster node when the control node cannot reach the
            controller API endpoint directly (SSH jump host, segmented
            management network).
          - "Common override: the first host in the C(linstor_controllers) inventory group."
          - The delegated node must have C(python-linstor) installed.
            Cluster nodes have it via LINSTOR package dependencies.
