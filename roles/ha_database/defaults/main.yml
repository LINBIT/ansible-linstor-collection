---
ha_database_pool: ""
ha_database_rg: linstor-db-grp
ha_database_res: linstor_db
ha_database_res_size: 200M

ha_database_filesystem: ext4
# Force 4K blocksize for cross-node 4Kn sector compatibility
ha_database_filesystem_blocksize: 4096

ha_database_max_controllers: 3

ha_database_allow_2_replica: false

# Virtual IP address for the HA controller (for example "10.0.0.100/24")
# When set, DRBD Reactor manages an IPaddr2 resource that floats with the
# active controller. The VIP is stored as an Aux/ha_database_vip controller
# property so client_install can discover it. Defaults to /24 if no CIDR given
ha_database_vip: ""

ha_database_drbd_options:
  resource:
    auto-promote: "no"
    quorum: majority
    on-no-quorum: io-error
    on-no-data-accessible: io-error
    on-suspended-primary-outdated: force-secondary
