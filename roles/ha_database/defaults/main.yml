---
ha_database_pool: ""
ha_database_rg: linstor-db-grp
ha_database_res: linstor_db
ha_database_res_size: 200M

ha_database_max_controllers: 3

# TieBreaker node for 2-node combined configurations. Only used when exactly 2 combined
# controller and satellite nodes exist. When empty, a satellite is chosen at random.
# Set to an inventory hostname to pin the TieBreaker to a specific node.
ha_database_tiebreaker_node: ""

# Virtual IP address for the HA controller (for example "10.0.0.100/24").
# When set, DRBD Reactor manages an IPaddr2 resource that floats with the
# active controller. The VIP is stored as an Aux/ha_database_vip controller
# property so client_install can discover it. Defaults to /24 if no CIDR given.
ha_database_vip: ""
_ha_db_vip_address: "{{ ha_database_vip.split('/')[0] }}"
_ha_db_vip_cidr: "{{ ha_database_vip.split('/')[1] if '/' in ha_database_vip else '24' }}"

# OCF resource agent base path (SUSE uses /usr/lib, others use /lib)
_ha_db_ocf_path: >-
  {%- if ansible_facts['os_family'] | lower == 'suse' -%}
    /usr/lib/ocf/resource.d/heartbeat
  {%- else -%}
    /lib/ocf/resource.d/heartbeat
  {%- endif -%}

# Combined controller and satellite nodes (intersection of inventory groups)
_ha_db_combined_nodes: "{{ groups['linstor_controllers'] | intersect(groups['linstor_diskful_satellites']) }}"

# Primary controller node: first controller in inventory, hosts the populated database
_ha_db_primary_node: "{{ groups['linstor_controllers'][0] }}"

ha_database_drbd_options:
  resource:
    auto-promote: "no"
    quorum: majority
    on-no-quorum: io-error
    on-no-data-accessible: io-error
    on-suspended-primary-outdated: force-secondary

# Use short hostnames (inventory_hostname_short) instead of FQDNs when registering nodes.
# Auto-detected from the kernel version (true on Proxmox VE). Can be overridden explicitly.
short_hostnames: "{{ 'pve' in ansible_facts['kernel'] }}"
linstor_hostname: "{{ inventory_hostname_short if short_hostnames | bool else inventory_hostname }}"
