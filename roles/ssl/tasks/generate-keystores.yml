---
- name: Create SSL directory
  ansible.builtin.file:
    path: "{{ ssl_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Check for existing keystore
  ansible.builtin.stat:
    path: "{{ ssl_dir }}/keystore.jks"
  register: _ssl_keystore_stat

- name: Generate node keystore
  ansible.builtin.command:
    cmd: >-
      keytool -genkeypair
      -keyalg {{ ssl_key_algorithm }}
      -keysize {{ ssl_key_size }}
      -validity {{ ssl_cert_validity_days }}
      -alias {{ linstor_hostname }}
      -dname "CN={{ linstor_hostname }}{{ ', OU=' + ssl_cert_ou if ssl_cert_ou else '' }}{{ ', O=' + ssl_cert_o if ssl_cert_o else '' }}{{ ', C=' + ssl_cert_c if ssl_cert_c else '' }}"
      -keystore {{ ssl_dir }}/keystore.jks
      -storepass {{ ssl_keystore_password }}
      -keypass {{ ssl_key_password }}
    creates: "{{ ssl_dir }}/keystore.jks"
  when: not _ssl_keystore_stat.stat.exists

- name: Check for existing certificate export
  ansible.builtin.stat:
    path: "{{ ssl_dir }}/{{ linstor_hostname }}.cer"
  register: _ssl_cert_stat

- name: Export node certificate
  ansible.builtin.command:
    cmd: >-
      keytool -exportcert
      -keystore {{ ssl_dir }}/keystore.jks
      -storepass {{ ssl_keystore_password }}
      -alias {{ linstor_hostname }}
      -file {{ ssl_dir }}/{{ linstor_hostname }}.cer
    creates: "{{ ssl_dir }}/{{ linstor_hostname }}.cer"
  when: not _ssl_cert_stat.stat.exists
