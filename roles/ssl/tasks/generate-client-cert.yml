---
# Runs on first controller only to generate a client certificate for mTLS
- name: Generate client keystore
  ansible.builtin.command:
    cmd: >-
      keytool -genkeypair
      -keyalg {{ ssl_key_algorithm }}
      -keysize {{ ssl_key_size }}
      -validity {{ ssl_cert_validity_days }}
      -alias linstor-client
      -dname "CN=linstor-client{{ ', OU=' + ssl_cert_ou if ssl_cert_ou else '' }}{{ ', O=' + ssl_cert_o if ssl_cert_o else '' }}{{ ', C=' + ssl_cert_c if ssl_cert_c else '' }}"
      -keystore {{ ssl_dir }}/client.jks
      -storepass {{ ssl_keystore_password }}
      -keypass {{ ssl_key_password }}
    creates: "{{ ssl_dir }}/client.jks"
  run_once: true
  delegate_to: "{{ groups['linstor_controllers'][0] }}"

- name: Export client certificate from client keystore
  ansible.builtin.command:
    cmd: >-
      keytool -exportcert
      -keystore {{ ssl_dir }}/client.jks
      -storepass {{ ssl_keystore_password }}
      -alias linstor-client
      -file {{ ssl_dir }}/client.cer
    creates: "{{ ssl_dir }}/client.cer"
  run_once: true
  delegate_to: "{{ groups['linstor_controllers'][0] }}"

- name: Create client truststore and import client certificate
  ansible.builtin.command:
    cmd: >-
      keytool -importcert -noprompt
      -keystore {{ ssl_dir }}/truststore_client.jks
      -storepass {{ ssl_truststore_password }}
      -alias linstor-client
      -file {{ ssl_dir }}/client.cer
    creates: "{{ ssl_dir }}/truststore_client.jks"
  run_once: true
  delegate_to: "{{ groups['linstor_controllers'][0] }}"

- name: Convert client keystore to PKCS12
  ansible.builtin.command:
    cmd: >-
      keytool -importkeystore
      -srckeystore {{ ssl_dir }}/client.jks
      -srcstorepass {{ ssl_keystore_password }}
      -destkeystore {{ ssl_dir }}/client.p12
      -deststoretype PKCS12
      -deststorepass {{ ssl_keystore_password }}
    creates: "{{ ssl_dir }}/client.p12"
  run_once: true
  delegate_to: "{{ groups['linstor_controllers'][0] }}"

- name: Extract client PEM with password
  ansible.builtin.command:
    cmd: >-
      openssl pkcs12
      -in {{ ssl_dir }}/client.p12
      -passin pass:{{ ssl_keystore_password }}
      -out {{ ssl_dir }}/client_with_pass.pem
      -passout pass:{{ ssl_key_password }}
    creates: "{{ ssl_dir }}/client_with_pass.pem"
  run_once: true
  delegate_to: "{{ groups['linstor_controllers'][0] }}"

- name: Extract client key without password
  ansible.builtin.command:
    cmd: >-
      openssl rsa
      -in {{ ssl_dir }}/client_with_pass.pem
      -passin pass:{{ ssl_key_password }}
      -out {{ ssl_dir }}/client.key
    creates: "{{ ssl_dir }}/client.key"
  run_once: true
  delegate_to: "{{ groups['linstor_controllers'][0] }}"

- name: Extract client certificate as PEM
  ansible.builtin.command:
    cmd: >-
      openssl x509
      -in {{ ssl_dir }}/client_with_pass.pem
      -out {{ ssl_dir }}/client.pem
    creates: "{{ ssl_dir }}/client.pem"
  run_once: true
  delegate_to: "{{ groups['linstor_controllers'][0] }}"

# Fetch and distribute client cert and truststore to all controllers
- name: Fetch client PEM from first controller
  ansible.builtin.fetch:
    src: "{{ ssl_dir }}/client.pem"
    dest: "/tmp/linstor-ssl-certs/client.pem"
    flat: true
  run_once: true
  delegate_to: "{{ groups['linstor_controllers'][0] }}"

- name: Fetch client truststore from first controller
  ansible.builtin.fetch:
    src: "{{ ssl_dir }}/truststore_client.jks"
    dest: "/tmp/linstor-ssl-certs/truststore_client.jks"
    flat: true
  run_once: true
  delegate_to: "{{ groups['linstor_controllers'][0] }}"

- name: Distribute client PEM to all cluster nodes
  ansible.builtin.copy:
    src: "/tmp/linstor-ssl-certs/client.pem"
    dest: "{{ ssl_dir }}/client.pem"
    owner: root
    group: root
    mode: '0600'

- name: Distribute client truststore to all controllers
  ansible.builtin.copy:
    src: "/tmp/linstor-ssl-certs/truststore_client.jks"
    dest: "{{ ssl_dir }}/truststore_client.jks"
    owner: root
    group: root
    mode: '0600'
  when: inventory_hostname in groups['linstor_controllers']
