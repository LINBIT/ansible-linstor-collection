---
# Fetch all node certificates to the Ansible controller
- name: Fetch node certificates to Ansible controller
  ansible.builtin.fetch:
    src: "{{ ssl_dir }}/{{ linstor_hostname }}.cer"
    dest: "/tmp/linstor-ssl-certs/{{ linstor_hostname }}.cer"
    flat: true

# Build list of peer hostnames for each node
# Controllers need satellite certs, satellites need controller certs,
# combined nodes need all peer certs
- name: Set peer node list for truststore
  ansible.builtin.set_fact:
    _ssl_peer_nodes: >-
      {{
        (groups['linstor_satellites'] + groups['linstor_controllers'])
        | map('extract', hostvars, 'linstor_hostname')
        | reject('equalto', linstor_hostname)
        | unique
        | list
      }}

# Copy peer certificates to each node
- name: Distribute peer certificates
  ansible.builtin.copy:
    src: "/tmp/linstor-ssl-certs/{{ item }}.cer"
    dest: "{{ ssl_dir }}/{{ item }}.cer"
    owner: root
    group: root
    mode: '0600'
  loop: "{{ _ssl_peer_nodes }}"

# Import each peer certificate into the truststore
- name: Import peer certificates into truststore
  ansible.builtin.command:
    cmd: >-
      keytool -importcert -noprompt
      -keystore {{ ssl_dir }}/certificates.jks
      -storepass {{ ssl_truststore_password }}
      -alias {{ item }}
      -file {{ ssl_dir }}/{{ item }}.cer
  register: _ssl_import_result
  failed_when:
    - _ssl_import_result.rc != 0
    - "'already exists' not in (_ssl_import_result.stdout | default('') + _ssl_import_result.stderr | default(''))"
  changed_when: "'already exists' not in (_ssl_import_result.stdout | default('') + _ssl_import_result.stderr | default(''))"
  loop: "{{ _ssl_peer_nodes }}"
