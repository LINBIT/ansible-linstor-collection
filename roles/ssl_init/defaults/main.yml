---
# Feature toggles (both default to true: if the role runs, encrypt everything)
ssl_init_https: true
ssl_init_satellite: true
ssl_init_https_mtls: false

# Private CA
ssl_init_ca_name: "LINSTOR CA"
ssl_init_ca_validity_days: 3650

# Certificate generation
ssl_init_generate_certs: true
ssl_init_cert_validity_days: 3650
ssl_init_key_algorithm: EC
ssl_init_ca_curve: secp384r1
ssl_init_node_curve: prime256v1
ssl_init_rsa_key_size: 4096
ssl_init_cert_ou: "{{ inventory_hostname }}"
ssl_init_cert_o: ""
ssl_init_cert_c: ""

# Paths
ssl_init_dir: /etc/linstor/ssl
# Local directory on the Ansible control node for the CA key, CA cert, and
# signed node certs. Persists across runs so new nodes can be signed later.
ssl_init_local_dir: "{{ lookup('env', 'HOME') }}/.config/linstor/ssl"

# Passwords (vault-ready)
ssl_init_keystore_password: linstor
ssl_init_truststore_password: linstor
ssl_init_key_password: linstor

# HTTPS settings
ssl_init_https_port: 3371

# Satellite SSL settings
ssl_init_satellite_port: 3367
ssl_init_satellite_protocol: "TLSv1.3"

# Delegation target for LINSTOR API tasks
# Override if Ansible control node cannot reach LINSTOR controller API endpoint
linstor_api_delegate: localhost
