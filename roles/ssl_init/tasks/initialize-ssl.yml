---
# openssl package is no longer guaranteed in RHEL 10
- name: Ensure openssl is installed
  ansible.builtin.package:
    name: openssl
    state: present

- name: Assert at least one SSL feature is enabled
  ansible.builtin.assert:
    that: ssl_init_https | bool or ssl_init_satellite | bool
    fail_msg: >-
      At least one of ssl_init_https or ssl_init_satellite must be true.
    quiet: true

- name: Assert ssl_init_https is true when ssl_init_https_mtls is true
  ansible.builtin.assert:
    that: ssl_init_https | bool
    fail_msg: >-
      ssl_init_https_mtls requires ssl_init_https to be true.
    quiet: true
  when: ssl_init_https_mtls | bool

- name: Build list of active controller nodes
  ansible.builtin.set_fact:
    _active_controllers: "{{ _active_controllers | default([]) + [item] }}"
  when: hostvars[item].ansible_facts.services['linstor-controller.service'].state | default('') == 'running'
  loop: "{{ groups['linstor_controllers'] }}"
  run_once: true  # noqa: run-once[task]

- name: Set active controller node and count
  ansible.builtin.set_fact:
    _active_controller_node: "{{ _active_controllers | default([]) | first | default(None) }}"
    _active_controller_count: "{{ _active_controllers | default([]) | length }}"
  run_once: true  # noqa: run-once[task]

- name: Assert at least one LINSTOR controller is running
  ansible.builtin.assert:
    that: _active_controller_count | int >= 1
    fail_msg: >-
      No LINSTOR controller is running.
      Standalone: start linstor-controller on {{ groups['linstor_controllers'][0] }}.
      HA: ensure DRBD Reactor is running and has promoted the controller resource.
    quiet: true
  run_once: true  # noqa: run-once[task]

- name: Assert exactly one LINSTOR controller is running
  ansible.builtin.assert:
    that: _active_controller_count | int == 1
    fail_msg: >-
      Multiple LINSTOR controllers are running ({{ _active_controllers | join(', ') }}).
      ssl_init requires exactly one; investigate split-brain or stop extras
      (HA clusters should only have one node with linstor-controller.service active).
    quiet: true
  run_once: true  # noqa: run-once[task]

- name: Verify external certificate files exist
  when: not (ssl_init_generate_certs | bool)
  block:
    - name: Check for required PEM files in ssl_init_dir
      ansible.builtin.stat:
        path: "{{ ssl_init_dir }}/{{ item }}"
      register: _ssl_init_external_files
      loop:
        - ca.crt
        - node.crt
        - node.key

    - name: Assert all required PEM files are present
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: >-
          Missing {{ item.item }} in {{ ssl_init_dir }}.
          When ssl_init_generate_certs is false, place ca.crt, node.crt, and
          node.key in {{ ssl_init_dir }} on each node before running this role.
        quiet: true
      loop: "{{ _ssl_init_external_files.results }}"
      loop_control:
        label: "{{ item.item }}"

- name: Generate private CA
  ansible.builtin.include_tasks: generate-ca.yml
  when: ssl_init_generate_certs | bool

- name: Generate node keystores and certificates
  ansible.builtin.include_tasks: generate-keystores.yml

- name: Build CA-based truststores for satellite SSL
  ansible.builtin.include_tasks: build-truststores.yml
  when: ssl_init_satellite | bool

- name: Install CA certificate into OS trust store
  ansible.builtin.include_tasks: install-ca-cert.yml

- name: Generate client certificate for mTLS
  ansible.builtin.include_tasks: generate-client-cert.yml
  when:
    - ssl_init_https_mtls | bool
    - ssl_init_generate_certs | bool

- name: Configure HTTPS on controllers
  ansible.builtin.include_tasks: configure-https.yml
  when:
    - ssl_init_https | bool
    - inventory_hostname in groups['linstor_controllers']

- name: Configure satellite SSL
  ansible.builtin.include_tasks: configure-satellite-ssl.yml
  when:
    - ssl_init_satellite | bool
    - inventory_hostname in groups['linstor_satellites']

# Flip DB before the restart: the controller boots with SslConnectors instead
# of caching PlainConnectors. Suppressed when the node doesn't exist yet.
- name: Update node network interface to SSL
  linbit.linstor.node:
    name: "{{ inventory_hostname }}"
    com_type: SSL
  when: ssl_init_satellite | bool
  register: _ssl_init_netif_update
  failed_when: false

# Detect HA via reactor TOML; the resource name is the file basename.
- name: Find DRBD Reactor config managing linstor-controller
  ansible.builtin.find:
    paths: /etc/drbd-reactor.d
    patterns: "*.toml"
    contains: "linstor-controller.service"
    read_whole_file: true
  delegate_to: "{{ _active_controller_node }}"
  register: _ssl_init_reactor_find
  run_once: true  # noqa: run-once[task]

- name: Set DRBD Reactor resource name
  ansible.builtin.set_fact:
    _ssl_init_reactor_resource: "{{ _ssl_init_reactor_find.files[0].path | basename | regex_replace('\\.toml$', '') }}"
  when: _ssl_init_reactor_find.matched | default(0) | int > 0
  run_once: true  # noqa: run-once[task]

# Disable reactor on every controller; disabling only the active node leaves
# other reactors racing to promote during the restart's brief demote window.
- name: Disable DRBD Reactor management of linstor-controller
  ansible.builtin.command: drbd-reactorctl disable {{ _ssl_init_reactor_resource }}
  when:
    - _ssl_init_reactor_resource is defined
    - inventory_hostname in groups['linstor_controllers']
  run_once: false
  changed_when: true

- name: Restart active controller for SSL
  ansible.builtin.service:
    name: linstor-controller.service
    state: restarted
  delegate_to: "{{ _active_controller_node }}"
  run_once: true  # noqa: run-once[task]

- name: Wait for controller after SSL restart
  ansible.builtin.wait_for:
    host: localhost
    port: "{{ ssl_init_https_port if ssl_init_https | bool else 3370 }}"
    delay: 5
    timeout: 60
  delegate_to: "{{ _active_controller_node }}"
  run_once: true  # noqa: run-once[task]

- name: Re-enable DRBD Reactor management of linstor-controller
  ansible.builtin.command: drbd-reactorctl enable {{ _ssl_init_reactor_resource }}
  when:
    - _ssl_init_reactor_resource is defined
    - inventory_hostname in groups['linstor_controllers']
  run_once: false
  changed_when: true

# Now restart satellites so they reconnect to the SSL-enabled controller.
- name: Restart linstor-satellite for SSL
  ansible.builtin.service:
    name: linstor-satellite.service
    state: restarted
  when: inventory_hostname in groups['linstor_satellites']

- name: Wait for linstor-satellite SSL port
  ansible.builtin.wait_for:
    host: localhost
    port: "{{ ssl_init_satellite_port }}"
    timeout: 30
  when: inventory_hostname in groups['linstor_satellites']

# Switch the CLI to HTTPS now that everything's on SSL.
- name: Update linstor-client.conf for HTTPS
  ansible.builtin.include_tasks: configure-client.yml
  when: ssl_init_https | bool

- name: Verify node is ONLINE over SSL
  linbit.linstor.node:
    name: "{{ inventory_hostname }}"
    state: query
  when: inventory_hostname in groups['linstor_satellites']
  register: _ssl_init_node_status
  retries: 12
  delay: 5
  until:
    - not (_ssl_init_node_status.exists | default(false))
      or _ssl_init_node_status.connection_status | default('') == 'ONLINE'
  failed_when:
    - _ssl_init_node_status.exists | default(false)
    - _ssl_init_node_status.connection_status | default('') != 'ONLINE'
  delegate_to: "{{ _active_controller_node }}"
