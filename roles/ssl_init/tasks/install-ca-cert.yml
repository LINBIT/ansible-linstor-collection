---
# Install the CA certificate into the operating system trust store.
# This allows non-Java clients (linstor-gateway, Proxmox plugin) to
# verify the LINSTOR controller's HTTPS certificate.
- name: Install CA certificate into Debian/Ubuntu trust store
  when: ansible_facts['os_family'] | lower == 'debian'
  block:
    - name: Copy CA certificate to Debian trust directory
      ansible.builtin.copy:
        src: "{{ ssl_init_dir }}/ca.crt"
        remote_src: true
        dest: /usr/local/share/ca-certificates/linstor-ca.crt
        owner: root
        group: root
        mode: '0644'
      register: _ssl_init_ca_debian

    - name: Update Debian CA certificates
      ansible.builtin.command:
        cmd: update-ca-certificates
      when: _ssl_init_ca_debian.changed  # noqa: no-handler
      changed_when: true

- name: Install CA certificate into RedHat trust store
  when: ansible_facts['os_family'] | lower == 'redhat'
  block:
    - name: Copy CA certificate to RedHat trust directory
      ansible.builtin.copy:
        src: "{{ ssl_init_dir }}/ca.crt"
        remote_src: true
        dest: /etc/pki/ca-trust/source/anchors/linstor-ca.crt
        owner: root
        group: root
        mode: '0644'
      register: _ssl_init_ca_redhat

    - name: Update RedHat CA trust
      ansible.builtin.command:
        cmd: update-ca-trust
      when: _ssl_init_ca_redhat.changed  # noqa: no-handler
      changed_when: true

- name: Install CA certificate into SUSE trust store
  when: ansible_facts['os_family'] | lower == 'suse'
  block:
    - name: Copy CA certificate to SUSE trust directory
      ansible.builtin.copy:
        src: "{{ ssl_init_dir }}/ca.crt"
        remote_src: true
        dest: /etc/pki/trust/anchors/linstor-ca.crt
        owner: root
        group: root
        mode: '0644'
      register: _ssl_init_ca_suse

    - name: Update SUSE CA certificates
      ansible.builtin.command:
        cmd: update-ca-certificates
      when: _ssl_init_ca_suse.changed  # noqa: no-handler
      changed_when: true
