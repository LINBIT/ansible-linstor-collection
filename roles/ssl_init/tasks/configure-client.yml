---
# Re-template linstor-client.conf with HTTPS/mTLS
- name: Render linstor-client.conf via client_install with SSL paths
  ansible.builtin.include_role:
    name: linbit.linstor.client_install
    tasks_from: configure-client
  vars:
    linstor_client_https: true
    linstor_client_certfile: "{{ (ssl_init_dir + '/client.pem') if ssl_init_https_mtls | default(false) | bool else '' }}"
    linstor_client_keyfile: "{{ (ssl_init_dir + '/client.key') if ssl_init_https_mtls | default(false) | bool else '' }}"

- name: Render control-node linstor-client.conf for HTTPS
  ansible.builtin.include_role:
    name: linbit.linstor.client_install
    tasks_from: configure-control-node
  vars:
    linstor_client_https: true
    linstor_client_cafile: "{{ ssl_init_local_dir }}/ca.crt"
    linstor_client_certfile: "{{ (ssl_init_local_dir + '/client.pem') if ssl_init_https_mtls | default(false) | bool else '' }}"
    linstor_client_keyfile: "{{ (ssl_init_local_dir + '/client.key') if ssl_init_https_mtls | default(false) | bool else '' }}"
