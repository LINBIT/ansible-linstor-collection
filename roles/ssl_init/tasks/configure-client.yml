---
# Re-template linstor-client.conf with HTTPS (and optional mTLS cert/key
# paths) by delegating to client_install. Single template lives in
# client_install - this role just supplies the SSL paths.
- name: Render linstor-client.conf via client_install with SSL paths
  ansible.builtin.include_role:
    name: linbit.linstor.client_install
    tasks_from: configure-client
  vars:
    linstor_client_https: true
    linstor_client_certfile: "{{ (ssl_init_dir + '/client.pem') if ssl_init_https_mtls | default(false) | bool else '' }}"
    linstor_client_keyfile: "{{ (ssl_init_dir + '/client.key') if ssl_init_https_mtls | default(false) | bool else '' }}"
    client_install_vip_discovery: false
