---
# Generate CA-signed node certificates using OpenSSL and convert to JKS
# keystores for LINSTOR's Java components.
- name: Create SSL directory
  ansible.builtin.file:
    path: "{{ ssl_init_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Distribute CA certificate
  ansible.builtin.copy:
    src: /tmp/linstor-ssl-certs/ca.crt
    dest: "{{ ssl_init_dir }}/ca.crt"
    owner: root
    group: root
    mode: '0644'

- name: Distribute CA key for certificate signing
  ansible.builtin.copy:
    src: /tmp/linstor-ssl-certs/ca.key
    dest: "{{ ssl_init_dir }}/ca.key"
    owner: root
    group: root
    mode: '0600'

- name: Build SAN extension for certificate
  ansible.builtin.set_fact:
    _ssl_init_san: >-
      {%- set sans = [] -%}
      {%- set _ = sans.append('DNS:' + linstor_hostname) -%}
      {%- if inventory_hostname != linstor_hostname -%}
        {%- set _ = sans.append('DNS:' + inventory_hostname) -%}
      {%- endif -%}
      {%- if inventory_hostname_short != linstor_hostname -%}
        {%- set _ = sans.append('DNS:' + inventory_hostname_short) -%}
      {%- endif -%}
      {%- set _ = sans.append('IP:' + replication_ip) -%}
      {%- set _ = sans.append('IP:127.0.0.1') -%}
      {%- if inventory_hostname in groups.get('linstor_controllers', []) -%}
        {%- for ip in groups['linstor_controllers'] | map('extract', hostvars, 'replication_ip') -%}
          {%- if 'IP:' + ip not in sans -%}
            {%- set _ = sans.append('IP:' + ip) -%}
          {%- endif -%}
        {%- endfor -%}
        {%- if linstor_ha_vip | default('') -%}
          {%- set _ = sans.append('IP:' + linstor_ha_vip.split('/')[0]) -%}
        {%- endif -%}
      {%- endif -%}
      {{ sans | join(',') }}

- name: Write OpenSSL extension file for SAN
  ansible.builtin.copy:
    content: |
      [v3_node]
      subjectAltName = {{ _ssl_init_san }}
      keyUsage = digitalSignature, keyEncipherment
      extendedKeyUsage = serverAuth, clientAuth
    dest: "{{ ssl_init_dir }}/openssl-san.cnf"
    owner: root
    group: root
    mode: '0600'

- name: Generate node private key
  ansible.builtin.command:
    cmd: >-
      openssl genpkey
      -algorithm {{ ssl_init_key_algorithm }}
      -pkeyopt rsa_keygen_bits:{{ ssl_init_key_size }}
      -out {{ ssl_init_dir }}/node.key
    creates: "{{ ssl_init_dir }}/node.key"

- name: Set node key permissions
  ansible.builtin.file:
    path: "{{ ssl_init_dir }}/node.key"
    owner: root
    group: root
    mode: '0600'

- name: Generate certificate signing request
  ansible.builtin.command:
    cmd: >-
      openssl req -new
      -key {{ ssl_init_dir }}/node.key
      -out {{ ssl_init_dir }}/node.csr
      -subj "/CN={{ linstor_hostname }}{{ '/OU=' + ssl_init_cert_ou if ssl_init_cert_ou else '' }}{{ '/O=' + ssl_init_cert_o if ssl_init_cert_o else '' }}{{ '/C=' + ssl_init_cert_c if ssl_init_cert_c else '' }}"
    creates: "{{ ssl_init_dir }}/node.csr"

- name: Sign node certificate with CA
  ansible.builtin.command:
    cmd: >-
      openssl x509 -req
      -in {{ ssl_init_dir }}/node.csr
      -CA {{ ssl_init_dir }}/ca.crt
      -CAkey {{ ssl_init_dir }}/ca.key
      -CAcreateserial
      -out {{ ssl_init_dir }}/node.crt
      -days {{ ssl_init_cert_validity_days }}
      -extfile {{ ssl_init_dir }}/openssl-san.cnf
      -extensions v3_node
    creates: "{{ ssl_init_dir }}/node.crt"

- name: Create PKCS12 keystore
  ansible.builtin.command:
    cmd: >-
      openssl pkcs12 -export
      -in {{ ssl_init_dir }}/node.crt
      -inkey {{ ssl_init_dir }}/node.key
      -certfile {{ ssl_init_dir }}/ca.crt
      -out {{ ssl_init_dir }}/keystore.p12
      -name {{ linstor_hostname }}
      -passout pass:{{ ssl_init_keystore_password }}
    creates: "{{ ssl_init_dir }}/keystore.p12"

- name: Convert PKCS12 to JKS keystore
  ansible.builtin.command:
    cmd: >-
      keytool -importkeystore
      -srckeystore {{ ssl_init_dir }}/keystore.p12
      -srcstoretype PKCS12
      -srcstorepass {{ ssl_init_keystore_password }}
      -destkeystore {{ ssl_init_dir }}/keystore.jks
      -deststoretype JKS
      -deststorepass {{ ssl_init_keystore_password }}
    creates: "{{ ssl_init_dir }}/keystore.jks"

- name: Remove CA key from non-primary controller nodes
  ansible.builtin.file:
    path: "{{ ssl_init_dir }}/ca.key"
    state: absent
  when: inventory_hostname != groups['linstor_controllers'][0]

- name: Remove temporary signing files
  ansible.builtin.file:
    path: "{{ ssl_init_dir }}/{{ item }}"
    state: absent
  loop:
    - openssl-san.cnf
    - node.csr
    - keystore.p12
    - ca.srl
