---
# Generate CA-signed node certificates on the Ansible control node,
# then push cert + key to managed nodes for local JKS keystore conversion.
# The CA key never leaves the control node.

- name: Create per-node SSL directory on control node
  ansible.builtin.file:
    path: "{{ ssl_init_local_dir }}/{{ inventory_hostname }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: Build SAN extension for certificate
  ansible.builtin.set_fact:
    _ssl_init_san: >-
      {%- set sans = [] -%}
      {%- set _ = sans.append('DNS:' + inventory_hostname) -%}
      {%- if inventory_hostname_short != inventory_hostname -%}
        {%- set _ = sans.append('DNS:' + inventory_hostname_short) -%}
      {%- endif -%}
      {%- if linstor_ip is defined and 'IP:' + linstor_ip not in sans -%}
        {%- set _ = sans.append('IP:' + linstor_ip) -%}
      {%- endif -%}
      {%- if replication_ip is defined and 'IP:' + replication_ip not in sans -%}
        {%- set _ = sans.append('IP:' + replication_ip) -%}
      {%- endif -%}
      {%- if ansible_host | regex_search('^\d+\.\d+\.\d+\.\d+$') and 'IP:' + ansible_host not in sans -%}
        {%- set _ = sans.append('IP:' + ansible_host) -%}
      {%- endif -%}
      {%- set _ = sans.append('IP:127.0.0.1') -%}
      {%- if inventory_hostname in groups.get('linstor_controllers', []) -%}
        {%- for host in groups['linstor_controllers'] -%}
          {%- set hv = hostvars[host] -%}
          {%- if hv.linstor_ip is defined and 'IP:' + hv.linstor_ip not in sans -%}
            {%- set _ = sans.append('IP:' + hv.linstor_ip) -%}
          {%- endif -%}
          {%- if hv.replication_ip is defined and 'IP:' + hv.replication_ip not in sans -%}
            {%- set _ = sans.append('IP:' + hv.replication_ip) -%}
          {%- endif -%}
        {%- endfor -%}
        {%- if linstor_ha_vip | default('') -%}
          {%- set _ = sans.append('IP:' + linstor_ha_vip.split('/')[0]) -%}
        {%- endif -%}
      {%- endif -%}
      {{ sans | join(',') }}

- name: Check if node certificate already exists on control node
  ansible.builtin.stat:
    path: "{{ ssl_init_local_dir }}/{{ inventory_hostname }}/node.crt"
  register: _ssl_init_local_node_crt
  delegate_to: localhost
  become: false

- name: Read existing node certificate SAN
  ansible.builtin.command:
    cmd: openssl x509 -in {{ ssl_init_local_dir }}/{{ inventory_hostname }}/node.crt -noout -ext subjectAltName
  when: _ssl_init_local_node_crt.stat.exists
  register: _ssl_init_existing_san
  changed_when: false
  failed_when: false
  delegate_to: localhost
  become: false

- name: Discard stale node cert and key when SAN does not cover the current inventory
  ansible.builtin.file:
    path: "{{ ssl_init_local_dir }}/{{ inventory_hostname }}/{{ item }}"
    state: absent
  when:
    - _ssl_init_local_node_crt.stat.exists
    - _ssl_init_existing_san.stdout is defined
    - _ssl_init_san.split(',') |
        map('regex_replace', '^IP:', 'IP Address:') |
        difference(_ssl_init_existing_san.stdout |
                   regex_findall('(?:DNS|IP Address):[^, \n]+')) |
        length > 0
  loop:
    - node.crt
    - node.key
  delegate_to: localhost
  become: false

- name: Re-stat node cert after potential discard
  ansible.builtin.stat:
    path: "{{ ssl_init_local_dir }}/{{ inventory_hostname }}/node.crt"
  register: _ssl_init_local_node_crt
  delegate_to: localhost
  become: false

- name: Write OpenSSL extension file on control node
  ansible.builtin.copy:
    content: |
      [v3_node]
      subjectAltName = {{ _ssl_init_san }}
      keyUsage = digitalSignature, keyEncipherment
      extendedKeyUsage = serverAuth, clientAuth
    dest: "{{ ssl_init_local_dir }}/{{ inventory_hostname }}/openssl-san.cnf"
    mode: '0600'
  when: not _ssl_init_local_node_crt.stat.exists
  delegate_to: localhost
  become: false

- name: Generate node private key on control node
  ansible.builtin.command:
    cmd: >-
      openssl genpkey
      -algorithm {{ ssl_init_key_algorithm }}
      -pkeyopt {{ _pkeyopt }}
      -out {{ ssl_init_local_dir }}/{{ inventory_hostname }}/node.key
    creates: "{{ ssl_init_local_dir }}/{{ inventory_hostname }}/node.key"
  vars:
    _pkeyopt: >-
      {{ 'ec_paramgen_curve:' + ssl_init_node_curve
         if ssl_init_key_algorithm == 'EC'
         else 'rsa_keygen_bits:' + ssl_init_rsa_key_size | string }}
  delegate_to: localhost
  become: false

- name: Generate certificate signing request on control node
  ansible.builtin.command:
    cmd: >-
      openssl req -new
      -key {{ ssl_init_local_dir }}/{{ inventory_hostname }}/node.key
      -out {{ ssl_init_local_dir }}/{{ inventory_hostname }}/node.csr
      -subj "/CN={{ inventory_hostname }}{{ _subj_ou }}{{ _subj_o }}{{ _subj_c }}"
    creates: "{{ ssl_init_local_dir }}/{{ inventory_hostname }}/node.crt"
  vars:
    _subj_ou: "{{ '/OU=' + ssl_init_cert_ou if ssl_init_cert_ou else '' }}"
    _subj_o: "{{ '/O=' + ssl_init_cert_o if ssl_init_cert_o else '' }}"
    _subj_c: "{{ '/C=' + ssl_init_cert_c if ssl_init_cert_c else '' }}"
  delegate_to: localhost
  become: false

# Throttled to 1 to prevent concurrent writes to ca.srl (serial number file).
- name: Sign node certificate with CA on control node
  ansible.builtin.command:
    cmd: >-
      openssl x509 -req
      -in {{ ssl_init_local_dir }}/{{ inventory_hostname }}/node.csr
      -CA {{ ssl_init_local_dir }}/ca.crt
      -CAkey {{ ssl_init_local_dir }}/ca.key
      -CAcreateserial
      -out {{ ssl_init_local_dir }}/{{ inventory_hostname }}/node.crt
      -days {{ ssl_init_cert_validity_days }}
      -extfile {{ ssl_init_local_dir }}/{{ inventory_hostname }}/openssl-san.cnf
      -extensions v3_node
    creates: "{{ ssl_init_local_dir }}/{{ inventory_hostname }}/node.crt"
  delegate_to: localhost
  become: false
  throttle: 1

- name: Remove temporary CSR and extension file from control node
  ansible.builtin.file:
    path: "{{ ssl_init_local_dir }}/{{ inventory_hostname }}/{{ item }}"
    state: absent
  loop:
    - openssl-san.cnf
    - node.csr
  delegate_to: localhost
  become: false

# --- Push cert material to managed node ---

- name: Create SSL directory on managed node
  ansible.builtin.file:
    path: "{{ ssl_init_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Push CA certificate to managed node
  ansible.builtin.copy:
    src: "{{ ssl_init_local_dir }}/ca.crt"
    dest: "{{ ssl_init_dir }}/ca.crt"
    owner: root
    group: root
    mode: '0644'
  register: _ssl_init_ca_push

- name: Push node certificate to managed node
  ansible.builtin.copy:
    src: "{{ ssl_init_local_dir }}/{{ inventory_hostname }}/node.crt"
    dest: "{{ ssl_init_dir }}/node.crt"
    owner: root
    group: root
    mode: '0644'
  register: _ssl_init_node_crt_push

- name: Push node key to managed node
  ansible.builtin.copy:
    src: "{{ ssl_init_local_dir }}/{{ inventory_hostname }}/node.key"
    dest: "{{ ssl_init_dir }}/node.key"
    owner: root
    group: root
    mode: '0600'
  register: _ssl_init_node_key_push

- name: Remove stale keystore when pushed cert material changed
  ansible.builtin.file:
    path: "{{ ssl_init_dir }}/{{ item }}"
    state: absent
  when: >-  # noqa: no-handler
    _ssl_init_node_crt_push.changed
    or _ssl_init_node_key_push.changed
    or _ssl_init_ca_push.changed
  loop:
    - keystore.jks
    - keystore.p12

# JKS conversion stays on managed node - requires Java/keytool.
- name: Create PKCS12 keystore
  ansible.builtin.command:
    cmd: >-
      openssl pkcs12 -export
      -in {{ ssl_init_dir }}/node.crt
      -inkey {{ ssl_init_dir }}/node.key
      -certfile {{ ssl_init_dir }}/ca.crt
      -out {{ ssl_init_dir }}/keystore.p12
      -name {{ inventory_hostname }}
      -passout pass:{{ ssl_init_keystore_password }}
    creates: "{{ ssl_init_dir }}/keystore.jks"

- name: Convert PKCS12 to JKS keystore
  ansible.builtin.command:
    cmd: >-
      keytool -importkeystore
      -srckeystore {{ ssl_init_dir }}/keystore.p12
      -srcstoretype PKCS12
      -srcstorepass {{ ssl_init_keystore_password }}
      -destkeystore {{ ssl_init_dir }}/keystore.jks
      -deststoretype JKS
      -deststorepass {{ ssl_init_keystore_password }}
    creates: "{{ ssl_init_dir }}/keystore.jks"
  notify:
    - ssl_controller_changed
    - ssl_satellite_changed

- name: Remove temporary PKCS12 file from managed node
  ansible.builtin.file:
    path: "{{ ssl_init_dir }}/keystore.p12"
    state: absent
