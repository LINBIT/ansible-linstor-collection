---
# handlers file for ssl
# Controller restart is handled explicitly at the end of initialize-ssl.yml
# to avoid a redundant restart when satellite SSL is also enabled.

- name: Restart LINSTOR satellite for SSL
  ansible.builtin.systemd_service:
    name: linstor-satellite.service
    daemon_reload: true
    state: restarted
  listen: restart_linstor_satellite_ssl

# Only wait for port here. ONLINE verification happens after node registration
# and controller restart at the end of initialize-ssl.yml.
- name: Wait for LINSTOR satellite SSL port
  ansible.builtin.wait_for:
    host: localhost
    port: "{{ ssl_init_satellite_port }}"
    timeout: 30
  listen: restart_linstor_satellite_ssl
