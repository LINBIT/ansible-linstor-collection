---
# handlers file for ssl
# Controller restart is handled explicitly at the end of initialize-ssl.yml
# to avoid a redundant restart when satellite SSL is also enabled.

- name: Restart LINSTOR satellite for SSL
  ansible.builtin.systemd_service:
    name: linstor-satellite.service
    daemon_reload: true
    state: restarted
  listen: restart_linstor_satellite_ssl

- name: Wait for LINSTOR satellite after SSL restart
  ansible.builtin.wait_for:
    host: localhost
    port: "{{ ssl_init_satellite_port if ssl_init_satellite | bool else 3366 }}"
    delay: 5
    timeout: 20
  listen: restart_linstor_satellite_ssl
