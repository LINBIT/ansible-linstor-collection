---
# Shared defaults for all gateway protocols
ha_gateway_storage_pool: ""
ha_gateway_place_count: 2
ha_gateway_tickle_dir_size: 64M
ha_gateway_fstype: ext4

ha_gateway_drbd_options:
  auto-promote: 'no'
  quorum: majority
  on-suspended-primary-outdated: 'force-secondary'
  on-no-quorum: 'io-error'

# iSCSI-specific defaults
ha_gateway_iscsi_port: 3260
ha_gateway_iscsi_iqn_base: iqn.2019-08.com.linbit

# NFS-specific defaults
ha_gateway_nfs_port: 2049
ha_gateway_nfs_allowed_ips:
  - 0.0.0.0/0
ha_gateway_nfs_options: rw,all_squash,anonuid=0,anongid=0

# NVMe-oF-specific defaults
ha_gateway_nvmeof_port: 4420

# Node hostname for LINSTOR API calls.
# Forces short hostnames on Proxmox VE (detected via kernel version), unaltered otherwise.
linstor_hostname: >-
  {{
    inventory_hostname_short
    if 'pve' in ansible_facts['kernel']
    else inventory_hostname
  }}
