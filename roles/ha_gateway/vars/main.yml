---
# OCF resource agent base path (SUSE uses /usr/lib, others use /lib)
_ra_base_dir: >-
  {{ '/usr/lib/ocf/resource.d/heartbeat'
     if ansible_facts['os_family'] | lower == 'suse'
     else '/lib/ocf/resource.d/heartbeat' }}

# Gateway-compatible resource definition names per protocol
# iSCSI: WWN = last colon-separated part of IQN (user-supplied or defaulted)
# NFS:   target name as-is
# NVMe-oF: subsystem = last colon-separated part of NQN (user-supplied or defaulted)
_ha_gw_iscsi_names: >-
  {%- set result = [] -%}
  {%- for t in linstor_iscsi_targets | default([]) -%}
    {%- set ident = t.iqn | default(ha_gateway_iscsi_iqn_base ~ ':' ~ t.name) -%}
    {%- set _ = result.append(ident.split(':') | last) -%}
  {%- endfor -%}
  {{ result }}

_ha_gw_nfs_names: >-
  {{ linstor_nfs_exports | default([]) | map(attribute='name') | list }}

_ha_gw_nvmeof_names: >-
  {%- set result = [] -%}
  {%- for t in linstor_nvmeof_targets | default([]) -%}
    {%- set ident = t.nqn | default(ha_gateway_nvmeof_nqn_base ~ ':' ~ t.name) -%}
    {%- set _ = result.append(ident.split(':') | last) -%}
  {%- endfor -%}
  {{ result }}

_ha_gw_all_resource_names: >-
  {{ _ha_gw_iscsi_names + _ha_gw_nfs_names + _ha_gw_nvmeof_names }}

_ha_gw_mkfs_opts: >-
  {%- if ha_gateway_fstype == 'ext4' -%}
    -b {{ ha_gateway_filesystem_blocksize }}
  {%- elif ha_gateway_fstype == 'xfs' -%}
    -b size={{ ha_gateway_filesystem_blocksize }}
  {%- endif -%}
