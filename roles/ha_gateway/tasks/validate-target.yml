# SPDX-License-Identifier: MIT
#
# Validate target definitions for ha_gateway.
# Included from prepare-target.yml when: _gw_present | length > 0
---
- name: Validate NFS exports have non-overlapping nodes
  ansible.builtin.assert:
    that: >-
      _gw_present | map(attribute='nodes') | flatten
      | length
      ==
      _gw_present | map(attribute='nodes') | flatten | unique
      | length
    fail_msg: >-
      NFS export node lists must not overlap (the kernel NFS server is a
      per-host singleton). A node cannot host more than one NFS service.
  run_once: true  # noqa: run-once[task]
  when:
    - _sizes_key == 'exports'
    - _gw_present | length > 1

- name: "Validate target nodes is defined - {{ _protocol }}"
  ansible.builtin.assert:
    that: _target.nodes is defined
    fail_msg: >-
      Target {{ _target.name }} requires a nodes list
      (3 inventory hostnames for placement)
  loop: "{{ _gw_present }}"
  loop_control:
    loop_var: _target
    label: "{{ _target.name }}"
  run_once: true  # noqa: run-once[task]

- name: "Validate target place_count - {{ _protocol }}"
  ansible.builtin.assert:
    that: (_target.place_count | default(ha_gateway_place_count)) | int in [2, 3]
    fail_msg: >-
      place_count must be 2 or 3 for target {{ _target.name }},
      got {{ _target.place_count | default(ha_gateway_place_count) }}
  loop: "{{ _gw_present }}"
  loop_control:
    loop_var: _target
    label: "{{ _target.name }}"
  run_once: true  # noqa: run-once[task]

- name: "Validate target nodes list size - {{ _protocol }}"
  ansible.builtin.assert:
    that: _target.nodes | length == 3
    fail_msg: >-
      Target {{ _target.name }} nodes list must have exactly 3 members,
      got {{ _target.nodes | length }}
  loop: "{{ _gw_present }}"
  loop_control:
    loop_var: _target
    label: "{{ _target.name }}"
  run_once: true  # noqa: run-once[task]

- name: "Validate target nodes are satellites - {{ _protocol }}"
  ansible.builtin.assert:
    that: (_target.nodes | difference(groups['linstor_satellites'])) | length == 0
    fail_msg: >-
      Target {{ _target.name }} nodes list contains non-satellite hosts:
      {{ _target.nodes | difference(groups['linstor_satellites']) | join(', ') }}
  loop: "{{ _gw_present }}"
  loop_control:
    loop_var: _target
    label: "{{ _target.name }}"
  run_once: true  # noqa: run-once[task]

- name: "Validate target has enough diskful satellites - {{ _protocol }}"
  ansible.builtin.assert:
    that: >-
      _target.nodes
      | intersect(groups.get('linstor_diskful_satellites', []))
      | length >= 2
    fail_msg: >-
      Target {{ _target.name }} requires at least 2 diskful satellites,
      got {{ _target.nodes
             | intersect(groups.get('linstor_diskful_satellites', []))
             | length }}
  loop: "{{ _gw_present }}"
  loop_control:
    loop_var: _target
    label: "{{ _target.name }}"
  run_once: true  # noqa: run-once[task]
