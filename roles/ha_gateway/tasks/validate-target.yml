# SPDX-License-Identifier: MIT
#
# Validate target definitions for ha_gateway.
# Included from prepare-target.yml when: _gw_present | length > 0
---
- name: Validate NFS exports with explicit nodes have non-overlapping nodes
  ansible.builtin.assert:
    that: >-
      _explicit_nodes | length == _explicit_nodes | unique | length
    fail_msg: >-
      NFS export node lists must not overlap (the kernel NFS server is a
      per-host singleton). A node cannot host more than one NFS service.
    quiet: true
  vars:
    _explicit_nodes: >-
      {{ _gw_present
         | selectattr('nodes', 'defined')
         | map(attribute='nodes')
         | reject('equalto', [])
         | flatten }}
  run_once: true  # noqa: run-once[task]
  when:
    - _sizes_key == 'exports'
    - _gw_present | length > 1

- name: "Validate target place_count - {{ _protocol }}"
  ansible.builtin.assert:
    that: (_target.place_count | default(ha_gateway_place_count)) | int in [2, 3]
    fail_msg: >-
      place_count must be 2 or 3 for target {{ _target.name }},
      got {{ _target.place_count | default(ha_gateway_place_count) }}
    quiet: true
  loop: "{{ _gw_present | rejectattr('resource_group', 'defined') | list }}"
  loop_control:
    loop_var: _target
    label: "{{ _target.name }}"
  run_once: true  # noqa: run-once[task]

- name: "Validate target nodes list size - {{ _protocol }}"
  ansible.builtin.assert:
    that:
      - _target.nodes | length <= 3
      - _target.nodes | length >= (_target.place_count | default(ha_gateway_place_count)) | int
    fail_msg: >-
      Target {{ _target.name }} nodes list must have between
      {{ (_target.place_count | default(ha_gateway_place_count)) | int }} and 3 members,
      got {{ _target.nodes | length }}
    quiet: true
  loop: "{{ _gw_present | selectattr('nodes', 'defined') | rejectattr('nodes', 'equalto', []) | list }}"
  loop_control:
    loop_var: _target
    label: "{{ _target.name }}"
  run_once: true  # noqa: run-once[task]

- name: "Validate target nodes are satellites - {{ _protocol }}"
  ansible.builtin.assert:
    that: (_target.nodes | difference(groups['linstor_satellites'])) | length == 0
    fail_msg: >-
      Target {{ _target.name }} nodes list contains non-satellite hosts:
      {{ _target.nodes | difference(groups['linstor_satellites']) | join(', ') }}
    quiet: true
  loop: "{{ _gw_present | selectattr('nodes', 'defined') | rejectattr('nodes', 'equalto', []) | list }}"
  loop_control:
    loop_var: _target
    label: "{{ _target.name }}"
  run_once: true  # noqa: run-once[task]

- name: "Query storage pools to resolve diskful nodes - {{ _protocol }}"
  linbit.linstor.storage_pool_info:
  delegate_to: "{{ linstor_api_delegate }}"
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
  run_once: true  # noqa: run-once[task]
  register: _gw_sp_info

- name: "Resolve diskful nodes from live storage pools - {{ _protocol }}"
  ansible.builtin.set_fact:
    _gw_diskful_nodes: >-
      {{ _gw_sp_info.storage_pools
         | rejectattr('provider_kind', 'equalto', 'DISKLESS')
         | map(attribute='node') | unique | list }}
  run_once: true  # noqa: run-once[task]

- name: "Validate the first place_count nodes are diskful satellites - {{ _protocol }}"
  ansible.builtin.assert:
    that: >-
      _target.nodes[:(_target.place_count | default(ha_gateway_place_count)) | int]
      | difference(_gw_diskful_nodes)
      | length == 0
    fail_msg: >-
      The first {{ (_target.place_count | default(ha_gateway_place_count)) | int }}
      nodes for target {{ _target.name }} must be diskful satellites (have a storage pool).
      Non-diskful: {{ _target.nodes[:(_target.place_count | default(ha_gateway_place_count)) | int]
                      | difference(_gw_diskful_nodes)
                      | join(', ') }}
    quiet: true
  loop: "{{ _gw_present | selectattr('nodes', 'defined') | rejectattr('nodes', 'equalto', []) | list }}"
  loop_control:
    loop_var: _target
    label: "{{ _target.name }}"
  run_once: true  # noqa: run-once[task]
