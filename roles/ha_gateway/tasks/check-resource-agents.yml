# SPDX-License-Identifier: MIT
#
# Verify OCF resource agents exist on target nodes before deploying promoter configs.
# Included from deploy-target.yml.
---
- name: "Check shared resource agents exist - {{ _protocol }}"
  ansible.builtin.stat:
    path: "{{ _ra_base_dir }}/{{ item }}"
  loop:
    - portblock
    - Filesystem
    - IPaddr2
  register: _ra_shared

- name: "Assert shared resource agents exist - {{ _protocol }}"
  ansible.builtin.assert:
    that: item.stat.exists
    fail_msg: >-
      Resource agent {{ item.item }} not found at {{ _ra_base_dir }}/{{ item.item }}
      on {{ inventory_hostname }}. Install resource-agents package or
      run gateway_satellite first.
    quiet: true
  loop: "{{ _ra_shared.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: "Check iSCSI resource agents exist - {{ _protocol }}"
  ansible.builtin.stat:
    path: "{{ _ra_base_dir }}/{{ item }}"
  when: _toml_prefix == 'iscsi'
  loop:
    - iSCSITarget
    - iSCSILogicalUnit
  register: _ra_iscsi

- name: "Assert iSCSI resource agents exist - {{ _protocol }}"
  ansible.builtin.assert:
    that: item.stat.exists
    fail_msg: >-
      Resource agent {{ item.item }} not found at {{ _ra_base_dir }}/{{ item.item }}
      on {{ inventory_hostname }}. Install iSCSI resource agents.
    quiet: true
  when: _toml_prefix == 'iscsi'
  loop: "{{ _ra_iscsi.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"

- name: "Determine NFS implementations present - {{ _protocol }}"
  ansible.builtin.set_fact:
    _ha_gw_nfs_kernel_names: >-
      {%- set ns = [] -%}
      {%- for t in _gw_present -%}
        {%- if (t.implementation | default(ha_gateway_nfs_implementation)) == 'kernel' -%}
          {%- set _ = ns.append(t._rd_name) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns }}
    _ha_gw_nfs_ganesha_names: >-
      {%- set ns = [] -%}
      {%- for t in _gw_present -%}
        {%- if (t.implementation | default(ha_gateway_nfs_implementation)) == 'ganesha' -%}
          {%- set _ = ns.append(t._rd_name) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns }}
  when: _toml_prefix == 'nfs'

- name: "Check kernel NFS resource agents exist - {{ _protocol }}"
  ansible.builtin.stat:
    path: "{{ _ra_base_dir }}/{{ item }}"
  when:
    - _toml_prefix == 'nfs'
    - _ha_gw_nfs_kernel_names | length > 0
  loop:
    - nfsserver
    - exportfs
  register: _ra_nfs_kernel

- name: "Assert kernel NFS resource agents exist - {{ _protocol }}"
  ansible.builtin.assert:
    that: item.stat.exists
    fail_msg: >-
      Resource agent {{ item.item }} not found at {{ _ra_base_dir }}/{{ item.item }}
      on {{ inventory_hostname }}. Install NFS resource agents.
    quiet: true
  when:
    - _toml_prefix == 'nfs'
    - _ha_gw_nfs_kernel_names | length > 0
  loop: "{{ _ra_nfs_kernel.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"

- name: "Check ganesha NFS resource agent exists - {{ _protocol }}"
  ansible.builtin.stat:
    path: "{{ _ra_base_dir }}/ganesha-nfs"
  when:
    - _toml_prefix == 'nfs'
    - _ha_gw_nfs_ganesha_names | length > 0
  register: _ra_nfs_ganesha

- name: "Assert ganesha NFS resource agent exists - {{ _protocol }}"
  ansible.builtin.assert:
    that: _ra_nfs_ganesha.stat.exists
    fail_msg: >-
      Resource agent ganesha-nfs not found at {{ _ra_base_dir }}/ganesha-nfs
      on {{ inventory_hostname }}. Install the agent with resource_agents_upstream
      (resource_agents_upstream_version: main) and the NFS-Ganesha daemon with
      gateway_satellite_ganesha.
    quiet: true
  when:
    - _toml_prefix == 'nfs'
    - _ha_gw_nfs_ganesha_names | length > 0

- name: "Check NVMe-oF resource agents exist - {{ _protocol }}"
  ansible.builtin.stat:
    path: "{{ _ra_base_dir }}/{{ item }}"
  when: _toml_prefix == 'nvmeof'
  loop:
    - nvmet-subsystem
    - nvmet-namespace
    - nvmet-port
  register: _ra_nvmeof

- name: "Assert NVMe-oF resource agents exist - {{ _protocol }}"
  ansible.builtin.assert:
    that: item.stat.exists
    fail_msg: >-
      Resource agent {{ item.item }} not found at {{ _ra_base_dir }}/{{ item.item }}
      on {{ inventory_hostname }}. Install nvmet-cli and NVMe-oF resource agents.
    quiet: true
  when: _toml_prefix == 'nvmeof'
  loop: "{{ _ra_nvmeof.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
