---
- name: Validate resource names are unique across all gateway targets
  ansible.builtin.assert:
    that: _ha_gw_all_resource_names | length == _ha_gw_all_resource_names | unique | length
    fail_msg: >-
      Duplicate resource names detected across gateway targets:
      {{ _ha_gw_all_resource_names | difference(_ha_gw_all_resource_names | unique) | join(', ') }}
    quiet: true
  run_once: true  # noqa: run-once[task]

- name: Validate service IPs are unique across all gateway targets
  ansible.builtin.assert:
    that: _all_ips | length == _all_ips | unique | length
    fail_msg: >-
      Duplicate service IPs detected across gateway targets:
      {{ _all_ips | difference(_all_ips | unique) | join(', ') }}
    quiet: true
  vars:
    _all_targets: >-
      {{ (linstor_iscsi_targets | default([]))
         + (linstor_nfs_exports | default([]))
         + (linstor_nvmeof_targets | default([])) }}
    _all_ips: >-
      {{ _all_targets
         | selectattr('state', 'undefined') | list
         + _all_targets
         | selectattr('state', 'defined')
         | selectattr('state', 'eq', 'present') | list
         | map(attribute='service_ips', default=[])
         | flatten
         | map('ansible.utils.ipaddr', 'address') | list }}
  run_once: true  # noqa: run-once[task]

- name: Deploy iSCSI targets
  ansible.builtin.include_tasks: prepare-target.yml
  vars:
    _protocol: iSCSI
    _targets: "{{ linstor_iscsi_targets | default([]) }}"
    _toml_template: promoter-iscsi.toml.j2
    _toml_prefix: iscsi
    _sizes_key: volumes
  when: linstor_iscsi_targets | default([]) | length > 0

- name: Deploy NFS exports
  ansible.builtin.include_tasks: prepare-target.yml
  vars:
    _protocol: NFS
    _targets: "{{ linstor_nfs_exports | default([]) }}"
    _toml_template: promoter-nfs.toml.j2
    _toml_prefix: nfs
    _sizes_key: exports
  when: linstor_nfs_exports | default([]) | length > 0

- name: Deploy NVMe-oF targets
  ansible.builtin.include_tasks: prepare-target.yml
  vars:
    _protocol: NVMe-oF
    _targets: "{{ linstor_nvmeof_targets | default([]) }}"
    _toml_template: promoter-nvmeof.toml.j2
    _toml_prefix: nvmeof
    _sizes_key: volumes
  when: linstor_nvmeof_targets | default([]) | length > 0
