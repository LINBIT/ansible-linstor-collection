# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Configure HA NFS and iSCSI resources with DRBD Reactor
    description:
      - Configure HA NFS and iSCSI gateway resources using DRBD Reactor promoter configs.
      - Ansible-driven alternative to the C(linstor-gateway) CLI tool.
      - Spawns LINSTOR resources, formats partitions, and writes DRBD Reactor promoter TOML configs.
    options:
      ha_gateway_nfs_exports:
        type: list
        elements: dict
        default: []
        description:
          - List of NFS exports to create.
          - "Each item supports keys: C(name) (required), C(size) (required), C(service_ip) (required), C(fstype)."
      ha_gateway_iscsi_targets:
        type: list
        elements: dict
        default: []
        description:
          - List of iSCSI targets to create.
          - "Each item supports keys: C(name) (required), C(size) (required), C(service_ip) (required), C(target_port), C(iqn_base), C(fstype)."
      ha_gateway_rg:
        type: str
        default: DfltRscGrp
        description:
          - LINSTOR resource group for spawned resources.
      ha_gateway_linstor_spawn:
        type: bool
        default: true
        description:
          - Whether to spawn LINSTOR resources.
          - Set C(false) if resources are already spawned.
      ha_gateway_prefer_diskful:
        type: bool
        default: true
        description:
          - Prefer diskful nodes as promoter targets.
          - Prevents promotion of HA resources on diskless nodes.
      ha_gateway_drbd_options:
        type: dict
        description:
          - DRBD options applied to HA gateway resources.
          - See C(defaults/main.yml) for the default options.
