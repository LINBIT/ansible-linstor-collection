# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Create HA iSCSI, NFS, and NVMe-oF targets with DRBD Reactor
    description:
      - Create highly available iSCSI targets, NFS exports, and NVMe-oF targets using DRBD Reactor promoter configs.
      - Interoperable with the LINSTOR Gateway CLI.
      - Resources created by this role appear in C(linstor-gateway iscsi list), C(linstor-gateway nfs list), and C(linstor-gateway nvme list).
      - Processes C(linstor_iscsi_targets), C(linstor_nfs_exports), and C(linstor_nvmeof_targets) inventory variables.
      - LINSTOR resource names follow the Gateway scheme, iSCSI WWN, NFS name, NVMe-oF subsystem.
      - Requires C(linbit.linstor.gateway_satellite) on all satellite nodes before use.
    options:
      ha_gateway_storage_pool:
        type: str
        default: ""
        description:
          - Default storage pool for resource placement.
          - When empty, LINSTOR auto-selects from available pools.
      ha_gateway_place_count:
        type: int
        default: 2
        description:
          - Default replica count for resource placement.
          - Use C(2) for 2 diskful + 1 tiebreaker, or C(3) for 3 diskful replicas.
      ha_gateway_tickle_dir_size:
        type: str
        default: 64M
        description:
          - Size of the portblock tickle_dir volume (volume 0 on every target).
      ha_gateway_fstype:
        type: str
        default: ext4
        description:
          - Default filesystem for portblock tickle_dir and data volumes.
      ha_gateway_drbd_options:
        type: dict
        description:
          - DRBD resource options applied to every target's resource definition.
          - See C(defaults/main.yml) for the default options.
      ha_gateway_iscsi_port:
        type: int
        default: 3260
        description:
          - Default iSCSI target port.
      ha_gateway_iscsi_iqn_base:
        type: str
        default: iqn.2026-06.com.linbit
        description:
          - Default IQN base when C(iqn) is not set on a target.
      ha_gateway_nfs_port:
        type: int
        default: 2049
        description:
          - NFS service port.
      ha_gateway_nfsv4_only:
        type: bool
        default: false
        description:
          - Run NFS in NFSv4-only mode.
          - Disables rpcbind, mountd, and statd in the OCF nfsserver agent.
          - Currently broken due to upstream nfsserver RA issues.
      ha_gateway_nfs_allowed_ips:
        type: list
        elements: str
        default:
          - 0.0.0.0/0
        description:
          - Default client CIDRs for NFS exports.
      ha_gateway_nfs_options:
        type: str
        default: "rw,all_squash,anonuid=0,anongid=0"
        description:
          - Default NFS export options string.
      ha_gateway_filesystem_blocksize:
        type: int
        default: 4096
        description:
          - Filesystem block size for portblock tickle_dir and data volumes.
          - Forces 4K for cross-node 4Kn sector compatibility.
      ha_gateway_nvmeof_port:
        type: int
        default: 4420
        description:
          - Default NVMe-oF target port.
      ha_gateway_nvmeof_nqn_base:
        type: str
        default: "nqn.2026-06.io.linbit:nvme"
        description:
          - Default NQN base when C(nqn) is not set on a target.
          - Auto-generates C(nqn_base:name) for targets without an explicit C(nqn).
      linstor_iscsi_targets:
        type: list
        elements: dict
        default: []
        description:
          - List of iSCSI target definitions.
          - Each entry requires C(name), C(service_ips), and C(volumes).
          - When C(nodes) is omitted or empty, LINSTOR autoplace selects nodes based on C(place_count).
      linstor_nfs_exports:
        type: list
        elements: dict
        default: []
        description:
          - List of NFS export definitions.
          - Each entry requires C(name), C(service_ips), and C(exports).
          - When C(nodes) is omitted or empty, LINSTOR autoplace selects nodes based on C(place_count).
      linstor_nvmeof_targets:
        type: list
        elements: dict
        default: []
        description:
          - List of NVMe-oF target definitions.
          - Each entry requires C(name), C(service_ips), and C(volumes). C(nqn) is optional and defaults to C(ha_gateway_nvmeof_nqn_base:name).
          - When C(nodes) is omitted or empty, LINSTOR autoplace selects nodes based on C(place_count).
