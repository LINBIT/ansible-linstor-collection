---
# The module gates on the controller's running version (REST API) and skips
# cleanly on controllers older than 1.34.0
- name: Initialize LINSTOR token authentication
  linbit.linstor.auth_init:
    description: "{{ auth_init_description }}"
    no_https: "{{ auth_init_no_https | bool }}"
  delegate_to: "{{ linstor_api_delegate }}"
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
  run_once: true  # noqa: run-once[task]
  register: _auth_init_result
  no_log: "{{ auth_init_no_log | bool }}"

- name: Resolve effective auth token
  ansible.builtin.set_fact:
    _auth_init_token: >-
      {{ '' if not (_auth_init_result.initialized | default(false))
         else (_auth_init_result.token | default('', true)
               or lookup('ansible.builtin.ini', 'auth-token',
                         section='global',
                         file=lookup('env', 'HOME') + '/.config/linstor/linstor-client.conf',
                         default='', errors='ignore')
               or '') }}
  no_log: "{{ auth_init_no_log | bool }}"

- name: Warn when token authentication is enabled but no token is available
  ansible.builtin.debug:
    msg: >-
      WARNING: token authentication is enabled on this cluster but no auth
      token is available on this control node. Subsequent LINSTOR tasks will
      fail to authenticate. Recover by reading a satellite's
      /var/lib/linstor.d/auth.json token to create a new user token, or stop
      the controller and run 'linstor-config disable-token-auth'.
  when:
    - _auth_init_result.initialized | default(false)
    - _auth_init_token | length == 0
  run_once: true  # noqa: run-once[task]

- name: Render control-node linstor-client.conf with auth token
  ansible.builtin.include_role:
    name: linbit.linstor.client_install
    tasks_from: configure-control-node
  vars:
    linstor_client_https: "{{ auth_init_client_https }}"
    linstor_client_cafile: "{{ auth_init_local_cafile }}"
    linstor_client_auth_token: "{{ _auth_init_token }}"
  when:
    - auth_init_save_control_node | bool
    - _auth_init_token | length > 0

- name: Render controller root linstor-client.conf with auth token
  ansible.builtin.include_role:
    name: linbit.linstor.client_install
    tasks_from: configure-controller-node
  vars:
    linstor_client_https: "{{ auth_init_client_https }}"
    linstor_client_cafile: "{{ auth_init_cluster_cafile }}"
    linstor_client_auth_token: "{{ _auth_init_token }}"
  when:
    - auth_init_save_controllers | bool
    - _auth_init_token | length > 0
    - inventory_hostname in groups['linstor_controllers']
