---
- name: Install LINSTOR Gateway from package manager
  ansible.builtin.package:
    name: linstor-gateway
    state: present
  failed_when: false
  notify: restart_linstor_gateway

- name: Determine if linstor-gateway is installed
  ansible.builtin.package_facts:
    manager: auto

# Fix later - GitHub release will not update after initial installation
- name: Install LINSTOR Gateway from GitHub
  ansible.builtin.get_url:
    url: "{{ linstor_gw_github_release }}"
    dest: '/usr/sbin/linstor-gateway'
    mode: '755'
  when: "'linstor-gateway' not in ansible_facts.packages"
  notify: restart_linstor_gateway

# Only needed when installing from GitHub
- name: Create linstor-gateway systemd service
  ansible.builtin.copy:
    src: linstor-gateway.service
    dest: /etc/systemd/system/linstor-gateway.service
    mode: '644'
  when: "'linstor-gateway' not in ansible_facts.packages"

- name: Create /etc/linstor-gateway if it does not exist
  ansible.builtin.file:
    path: /etc/linstor-gateway
    state: directory
    mode: '0755'

- name: Setup linstor-gateway.toml
  ansible.builtin.template:
    src: linstor-gateway.j2
    dest: /etc/linstor-gateway/linstor-gateway.toml
    mode: '644'

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Open firewalld port for LINSTOR Gateway
  ansible.posix.firewalld:
    port: 8337/tcp
    permanent: true
    immediate: true
    state: enabled
  when:
    - ansible_facts.services['firewalld.service'] is defined
    - ansible_facts.services['firewalld.service'].state == 'running'

# Satellite-side components (NFS/iSCSI RAs, packages, Reactor) are only
# needed on satellite nodes, not standalone controllers.
- name: Install LINSTOR Gateway satellite components
  ansible.builtin.include_role:
    name: linbit.linstor.linstor_gateway_satellite
  when: inventory_hostname in groups.get('linstor_satellites', [])

- name: Start and enable LINSTOR Gateway service
  ansible.builtin.systemd_service:
    name: linstor-gateway.service
    state: started
    enabled: true

- name: Flush handlers for linstor_gateway_install
  ansible.builtin.meta: flush_handlers
