# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Deploy a complete LINSTOR cluster
    description:
      - Convenience role that deploys a complete LINSTOR cluster with a single role call.
      - >-
        Includes the following roles in order: repo configuration,
        satellite_install, controller_install, cluster_membership, and
        optionally gateway_install, storage_pool, and ha_database.
    options:
      cluster_init_repo_access:
        type: str
        default: customer
        choices:
          - customer
          - public
          - none
        description:
          - "Repo access type: C(customer) for LINBIT portal, C(public) for Proxmox and open-source, or C(none) for self-managed repos."
      cluster_init_linstor_gateway:
        type: bool
        default: false
        description:
          - Also install LINSTOR Gateway on the cluster.
      cluster_init_deploy_storage:
        type: bool
        default: false
        description:
          - Create storage pools from C(linstor_storage_pools) inventory variable.
      cluster_init_ha_database:
        type: bool
        default: true
        description:
          - Convert LINSTOR database to HA.
          - Requires C(cluster_init_deploy_storage) and 2+ combined nodes.
      cluster_init_ssl:
        type: bool
        default: false
        description:
          - Encrypt all LINSTOR communication (HTTPS REST API + satellite SSL).
          - Includes the C(linbit.linstor.ssl_init) role.
      cluster_init_ssl_mtls:
        type: bool
        default: false
        description:
          - Restrict REST API to clients with a valid certificate.
          - Requires C(cluster_init_ssl) to be true.
