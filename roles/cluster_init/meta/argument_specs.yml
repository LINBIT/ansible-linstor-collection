# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Deploy a complete LINSTOR cluster
    description:
      - Convenience role that deploys a complete LINSTOR cluster with a single role call.
      - >-
        Includes the following roles in order: repo configuration, satellite_install, controller_install,
        cluster_membership, and optionally gateway_install, storage_pool, and ha_database.
    options:
      cluster_init_repo_access:
        type: str
        default: customer
        choices:
          - customer
          - public
          - none
        description:
          - >-
            Repo access type: C(customer) for LINBIT portal, C(public) for Proxmox and open-source, or
            C(none) for self-managed repos.
      cluster_init_linstor_gateway:
        type: bool
        default: false
        description:
          - Also install LINSTOR Gateway on the cluster.
      cluster_init_deploy_storage:
        type: bool
        default: true
        description:
          - Create storage pools from C(linstor_storage_pools) inventory variable.
          - Auto-skips when no pool targets a host, so it is safe to leave enabled.
      cluster_init_ha_database:
        type: bool
        default: true
        description:
          - Convert LINSTOR database to HA.
          - Auto-skips unless 2+ combined nodes and 3+ satellites exist.
      cluster_init_ssl:
        type: bool
        default: false
        description:
          - Encrypt all LINSTOR communication (HTTPS REST API + satellite SSL).
          - Includes the C(linbit.linstor.ssl_init) role.
      cluster_init_ssl_mtls:
        type: bool
        default: false
        description:
          - Restrict REST API to clients with a valid certificate.
          - Requires C(cluster_init_ssl) to be true.
      cluster_init_token_auth:
        type: bool
        default: true
        description:
          - Require token authentication for the REST API through the C(auth_init) role.
          - The C(auth_init) role gates on the controller's running version reported by the
            REST API and skips cleanly on controllers older than 1.34.0.
          - Set to false to disable.
