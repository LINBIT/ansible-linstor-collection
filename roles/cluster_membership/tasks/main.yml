# SPDX-License-Identifier: MIT
---
- name: Read satellite TOML config for SSL detection
  ansible.builtin.slurp:
    src: /etc/linstor/linstor_satellite.toml
  register: _cluster_membership_sat_toml
  failed_when: false
  changed_when: false

- name: Read controller TOML config for HTTPS detection
  ansible.builtin.slurp:
    src: /etc/linstor/linstor.toml
  when: inventory_hostname in groups['linstor_controllers']
  register: _cluster_membership_ctrl_toml
  failed_when: false
  changed_when: false

- name: Assert node registration IP is a valid IPv4 address
  ansible.builtin.assert:
    that: (_cluster_membership_linstor_ip | regex_search('^\d+\.\d+\.\d+\.\d+$')) is not none
    fail_msg: >-
      Node registration IP '{{ _cluster_membership_linstor_ip }}' is not a valid IPv4 address.
      Set linstor_ip or replication_ip in inventory, or ensure ansible_host is an IP address.
    quiet: true

- name: Assert replication_ip is a valid IPv4 address
  ansible.builtin.assert:
    that: (replication_ip | regex_search('^\d+\.\d+\.\d+\.\d+$')) is not none
    fail_msg: >-
      replication_ip '{{ replication_ip }}' is not a valid IPv4 address.
    quiet: true
  when: replication_ip is defined

- name: Assert host is not in both linstor_diskless_satellites and linstor_diskful_satellites
  ansible.builtin.assert:
    that: >-
      not (inventory_hostname in groups.get('linstor_diskless_satellites', []) and
           inventory_hostname in groups.get('linstor_diskful_satellites', []))
    fail_msg: >-
      {{ inventory_hostname }} is a member of both linstor_diskless_satellites and
      linstor_diskful_satellites. A node can only belong to one.
    quiet: true

# Initialize both pure controllers and combined (controller+satellite) nodes.
# Combined nodes detect SSL from satellite TOML. Pure controllers detect from controller TOML (HTTPS keystore).
- name: Register LINSTOR controller node
  linbit.linstor.node:
    name: "{{ inventory_hostname }}"
    ip: "{{ _cluster_membership_linstor_ip }}"
    node_type: "{{ node_type }}"
    com_type: "{{ _cluster_membership_com_type }}"
    port: "{{ _cluster_membership_port }}"
  vars:
    node_type: "{{ 'Combined' if 'linstor_satellites' in group_names else 'Controller' }}"
    _sat_ssl: "{{ (_cluster_membership_sat_toml.content | default('') | b64decode) is search('type.*ssl') }}"
    _ctrl_ssl: "{{ (_cluster_membership_ctrl_toml.content | default('') | b64decode | regex_search('(?m)^\\s*keystore\\s*=')) is not none }}"
    _is_ssl: "{{ _sat_ssl if 'linstor_satellites' in group_names else _ctrl_ssl }}"
    _cluster_membership_com_type: >-
      {{ cluster_membership_com_type | default(
         'SSL' if _is_ssl | bool
         else omit, true) }}
    _cluster_membership_port: >-
      {{ cluster_membership_port | default(omit, true) }}
  when: inventory_hostname in groups['linstor_controllers']
  delegate_to: localhost
  become: false
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
  register: _cluster_membership_ctrl_register

- name: Register LINSTOR satellite node
  linbit.linstor.node:
    name: "{{ inventory_hostname }}"
    ip: "{{ _cluster_membership_linstor_ip }}"
    node_type: Satellite
    com_type: "{{ _cluster_membership_com_type }}"
    port: "{{ _cluster_membership_port }}"
  vars:
    _cluster_membership_com_type: >-
      {{ cluster_membership_com_type | default(
         'SSL' if (_cluster_membership_sat_toml.content | default('') | b64decode) is search('type.*ssl')
         else omit, true) }}
    _cluster_membership_port: >-
      {{ cluster_membership_port | default(omit, true) }}
  when: inventory_hostname not in groups['linstor_controllers']
  delegate_to: localhost
  become: false
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"

# When replication_ip is defined and differs from the LINSTOR registration IP,
# register it as a second net interface (IP only, no port/com_type) and set
# node-level PrefNic so DRBD replication routes through it. Omitting port and
# com_type makes the interface a DRBD-only NIC, not a satellite connection
# candidate, so the controller's ReconnectorTask cannot flip the satellite
# connection onto it during reconnects.
- name: Register replication network interface
  linbit.linstor.node_interface:
    node: "{{ inventory_hostname }}"
    name: "{{ cluster_membership_replication_netif }}"
    ip: "{{ replication_ip }}"
  when:
    - replication_ip is defined
    - replication_ip != _cluster_membership_linstor_ip
  delegate_to: localhost
  become: false
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"

- name: Set PrefNic node property to route DRBD over replication interface
  linbit.linstor.node:
    name: "{{ inventory_hostname }}"
    properties:
      PrefNic: "{{ cluster_membership_replication_netif }}"
  when:
    - replication_ip is defined
    - replication_ip != _cluster_membership_linstor_ip
  delegate_to: localhost
  become: false
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"

# Restart controller when its net interface was changed (e.g. Plain → SSL).
- name: Restart controller after net interface change
  ansible.builtin.systemd_service:
    name: linstor-controller.service
    state: restarted
  when:
    - inventory_hostname in groups['linstor_controllers']
    - _cluster_membership_ctrl_register is changed

- name: Wait for controller after restart
  ansible.builtin.wait_for:
    host: localhost
    port: "{{ 3371 if (_cluster_membership_ctrl_toml.content | default('') | b64decode | regex_search('(?m)^\\s*keystore\\s*=')) is not none else 3370 }}"
    delay: 5
    timeout: 30
  when:
    - inventory_hostname in groups['linstor_controllers']
    - _cluster_membership_ctrl_register is changed
