---
- name: Assert host is not in both linstor_diskless_satellites and linstor_diskful_satellites
  ansible.builtin.assert:
    that: >-
      not (inventory_hostname in groups.get('linstor_diskless_satellites', []) and
           inventory_hostname in groups.get('linstor_diskful_satellites', []))
    fail_msg: >-
      {{ inventory_hostname }} is a member of both linstor_diskless_satellites and
      linstor_diskful_satellites. A node can only belong to one.

# Initialize both pure controllers and combined (controller+satellite) nodes
- name: Initialize LINSTOR controller membership
  vars:
    node_type: "{{ 'Combined' if 'linstor_satellites' in group_names else 'Controller' }}"
  ansible.builtin.shell: |
    linstor node create {{ linstor_hostname }} {{ replication_ip }} --node-type {{ node_type }}
  register: n_c_result
  failed_when: >
    n_c_result.rc != 0 and
    'already exists' not in n_c_result.stdout | lower and
    'already exists' not in n_c_result.stderr | lower
  changed_when: >
    n_c_result.rc == 0
  when: inventory_hostname in groups['linstor_controllers']

# Initialize pure satellites only
- name: Initialize LINSTOR satellite membership
  ansible.builtin.shell: |
    linstor node create {{ linstor_hostname }} {{ replication_ip }} --node-type Satellite
  register: n_c_result
  failed_when: >
    n_c_result.rc != 0 and
    'already exists' not in n_c_result.stdout | lower and
    'already exists' not in n_c_result.stderr | lower
  changed_when: >
    n_c_result.rc == 0
  when: inventory_hostname not in groups['linstor_controllers']
