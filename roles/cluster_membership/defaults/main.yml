---
# Node hostname for LINSTOR registration.
# Forces short hostnames on Proxmox VE (detected via PVE kernel or proxmox-ve package).
linstor_hostname: >-
  {{
    inventory_hostname_short
    if ansible_facts | linbit.common.is_pve
    else inventory_hostname
  }}

# Network communication type for node registration (Plain or SSL)
cluster_membership_com_type: Plain

# Network port for node registration
cluster_membership_port: 3366
