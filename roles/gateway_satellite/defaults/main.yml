---
# defaults file for gateway_satellite
gateway_satellite_firewall_rules: true

gateway_satellite_nfsv4_only: false # match ha_gateway default; nfsserver RA serves v3+v4

gateway_satellite_firewall_ports_base:
  - { port: '2049', proto: tcp } # nfsd (NFSv3 and NFSv4)
  - { port: '3260', proto: tcp } # iSCSI
  - { port: '4420', proto: tcp } # NVMe-oF

gateway_satellite_firewall_ports_nfsv3:
  - { port: '111', proto: tcp }   # rpcbind
  - { port: '20048', proto: tcp } # mountd

gateway_satellite_firewall_ports: >-
  {{ gateway_satellite_firewall_ports_base +
     ([] if gateway_satellite_nfsv4_only | bool else gateway_satellite_firewall_ports_nfsv3) }}

# SCST iSCSI target - delegated to linbit.drbd_reactor.scst_install
# Pin the build reference with scst_install_version when needed
gateway_satellite_scst: false

# NFS-Ganesha userspace NFS server - delegated to linbit.drbd_reactor.ganesha_install
# Pin the EL repository version with ganesha_install_sig_version when needed
gateway_satellite_ganesha: false

# Delegation target for LINSTOR API tasks
# Override if Ansible control node cannot reach LINSTOR controller API endpoint
linstor_api_delegate: localhost

# --- Token authentication (LINSTOR 1.34+) ---
# Auto-detect from the controller Auth/TokenAuthenticationEnabled property
# Set to true or false to override manually
gateway_satellite_token_auth: ""

# Create the daemon token only when it is missing (default). Set true to force
# a fresh token on every run, replacing the existing one, for rotation or to
# recover from a revoked token
gateway_satellite_token_force: false

# CA PEM content to trust for the controller REST endpoint, written to
# gateway_satellite_config_dir and used instead of the ssl_init CA file when the
# cluster does not run linbit.linstor.ssl_init
gateway_satellite_ca_cert: ""
