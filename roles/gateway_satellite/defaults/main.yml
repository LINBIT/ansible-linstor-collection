# SPDX-License-Identifier: MIT
---
# defaults file for gateway_satellite
gateway_satellite_firewall_rules: true

gateway_satellite_nfsv4_only: false # match ha_gateway default; nfsserver RA serves v3+v4

gateway_satellite_firewall_ports_base:
  - { port: '2049', proto: tcp } # nfsd (NFSv3 and NFSv4)
  - { port: '3260', proto: tcp } # iSCSI
  - { port: '4420', proto: tcp } # NVMe-oF

gateway_satellite_firewall_ports_nfsv3:
  - { port: '111', proto: tcp }   # rpcbind
  - { port: '20048', proto: tcp } # mountd

gateway_satellite_firewall_ports: >-
  {{ gateway_satellite_firewall_ports_base +
     ([] if gateway_satellite_nfsv4_only | bool else gateway_satellite_firewall_ports_nfsv3) }}

# SCST iSCSI target - compile and install from source
gateway_satellite_scst: false
# Empty resolves the latest SCST release tag; or pin a tag, branch, or SHA
# Newer EL kernels (EL9.8+, EL10) need 'master' until SCST 3.11 - see README
gateway_satellite_scst_version: ""

# Delegation target for LINSTOR API tasks
# Override if Ansible control node cannot reach LINSTOR controller API endpoint
linstor_api_delegate: localhost
