# SPDX-License-Identifier: MIT
---
# Wire the linstor-gateway daemon to authenticate against a LINSTOR 1.34+
# controller that has token authentication and REST HTTPS enabled. Creates a
# per-node token, points the daemon at it plus the controller CA, and restarts
# the daemon. Runs on the gateway serving nodes inside the controller-present
# block, so the API delegate can reach the controller.

- name: Detect controller token-authentication state
  linbit.linstor.controller_info:
  delegate_to: "{{ linstor_api_delegate }}"
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
  register: _gw_ctrl_info
  when: gateway_satellite_token_auth == ""

- name: Resolve effective token-authentication flag
  ansible.builtin.set_fact:
    _gw_token_auth: >-
      {{ (gateway_satellite_token_auth | bool)
         if gateway_satellite_token_auth != ""
         else (_gw_ctrl_info.properties['Auth/TokenAuthenticationEnabled']
               | default('false') | bool) }}
    _gw_token_desc: "linstor-gateway-{{ inventory_hostname }}"

- name: Configure daemon credentials when token authentication is enabled
  when: _gw_token_auth | bool
  block:
    - name: Ensure gateway config directory exists
      ansible.builtin.file:
        path: "{{ gateway_satellite_config_dir }}"
        state: directory
        mode: '0755'

    - name: Check for an existing gateway token file
      ansible.builtin.stat:
        path: "{{ gateway_satellite_config_dir }}/auth-token"
      register: _gw_token_stat

    - name: Create a dedicated gateway token
      when: not _gw_token_stat.stat.exists or gateway_satellite_token_force | bool
      block:
        - name: List existing auth tokens
          linbit.linstor.auth_token_info:
          delegate_to: "{{ linstor_api_delegate }}"
          environment:
            LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
          register: _gw_tokens

        - name: Remove stale gateway tokens for this node
          linbit.linstor.auth_token:
            state: absent
            tokenid: "{{ item.id }}"
          loop: "{{ _gw_tokens.tokens | selectattr('description', 'equalto', _gw_token_desc) | list }}"
          loop_control:
            label: "{{ item.id }}"
          delegate_to: "{{ linstor_api_delegate }}"
          environment:
            LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"

        - name: Create the gateway token
          linbit.linstor.auth_token:
            state: present
            description: "{{ _gw_token_desc }}"
          delegate_to: "{{ linstor_api_delegate }}"
          environment:
            LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
          register: _gw_new_token
          no_log: true

        - name: Write the gateway token file
          ansible.builtin.copy:
            content: "{{ _gw_new_token.token }}"
            dest: "{{ gateway_satellite_config_dir }}/auth-token"
            owner: root
            group: root
            mode: '0600'
          no_log: true
          notify: restart_linstor_gateway

    - name: Install provided CA content (standalone or override)
      ansible.builtin.copy:
        content: "{{ gateway_satellite_ca_cert }}"
        dest: "{{ gateway_satellite_config_dir }}/ca.crt"
        mode: '0644'
      when: gateway_satellite_ca_cert != ""
      notify: restart_linstor_gateway

    - name: Resolve the CA path the daemon trusts
      ansible.builtin.set_fact:
        _gw_ca_path: "{{ (gateway_satellite_config_dir ~ '/ca.crt')
                         if gateway_satellite_ca_cert != ''
                         else gateway_satellite_ca_cert_file }}"

    - name: Ensure gateway systemd drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/system/linstor-gateway.service.d
        state: directory
        mode: '0755'

    - name: Install the gateway server environment wrapper
      ansible.builtin.copy:
        src: linstor-gateway-server-wrapper.sh
        dest: /usr/local/sbin/linstor-gateway-server-wrapper
        mode: '0755'
      notify: restart_linstor_gateway

    - name: Install the gateway daemon systemd drop-in
      ansible.builtin.template:
        src: linstor-gateway-authenv.conf.j2
        dest: /etc/systemd/system/linstor-gateway.service.d/10-token-auth.conf
        mode: '0644'
      notify: restart_linstor_gateway
