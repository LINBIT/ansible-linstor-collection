# SPDX-License-Identifier: MIT
---
# Install SCST iSCSI target from source

- name: Check if SCST kernel module is already loaded
  ansible.builtin.stat:
    path: /sys/module/scst
  register: scst_module

- name: Set SCST install flag
  ansible.builtin.set_fact:
    _scst_needs_install: "{{ not scst_module.stat.exists }}"

- name: Select SCST fetch host and overall need
  ansible.builtin.set_fact:
    _scst_any_needed: >-
      {{ ansible_play_hosts | map('extract', hostvars, '_scst_needs_install')
         | map('bool') | select | list | length > 0 }}
    _scst_fetch_host: >-
      {{ ansible_play_hosts | map('extract', hostvars)
         | selectattr('_scst_needs_install', 'truthy')
         | map(attribute='inventory_hostname') | first | default('') }}
  run_once: true  # noqa: run-once[task]

- name: Fetch SCST source once to the control host cache
  when: _scst_any_needed | bool
  block:
    - name: Install git on the SCST fetch host
      ansible.builtin.package:
        name: git
        state: present
      delegate_to: "{{ _scst_fetch_host }}"
      run_once: true  # noqa: run-once[task]

    - name: Checkout SCST repo on the fetch host
      ansible.builtin.git:  # noqa: latest[git]
        repo: 'https://github.com/SCST-project/scst.git'
        version: "{{ gateway_satellite_scst_version }}"
        dest: /tmp/scst
      delegate_to: "{{ _scst_fetch_host }}"
      run_once: true  # noqa: run-once[task]

    - name: Package SCST source on the fetch host
      community.general.archive:
        path: /tmp/scst
        dest: /tmp/scst.tar.gz
        format: gz
        mode: '0644'
      delegate_to: "{{ _scst_fetch_host }}"
      run_once: true  # noqa: run-once[task]

    - name: Cache SCST source archive on the control host
      ansible.builtin.fetch:
        src: /tmp/scst.tar.gz
        dest: "{{ _scst_cache }}/{{ gateway_satellite_scst_version }}.tar.gz"
        flat: true
      delegate_to: "{{ _scst_fetch_host }}"
      run_once: true  # noqa: run-once[task]

- name: Build and install SCST from source
  when: _scst_needs_install | bool
  block:
    - name: Install tar for SCST source extraction
      ansible.builtin.package:
        name: tar
        state: present

    - name: Unpack SCST source from the control host cache
      ansible.builtin.unarchive:
        src: "{{ _scst_cache }}/{{ gateway_satellite_scst_version }}.tar.gz"
        dest: /tmp

    - name: Install kernel headers for SCST DKMS
      ansible.builtin.package:
        name: "{{ ansible_facts | linbit.common.dkms_kernel_headers }}"
        state: present

    - name: Build and install SCST (RHEL)
      when: ansible_facts['os_family'] | lower == 'redhat'
      block:
        - name: Install EPEL on Oracle Linux (DNF)
          ansible.builtin.dnf:
            name: "oracle-epel-release-el{{ ansible_facts['distribution_major_version'] }}"
            state: present
          when: ansible_facts['distribution'] | lower == 'oraclelinux'

        - name: Install EPEL on other RPM distros (DNF)
          ansible.builtin.dnf:
            name: epel-release
            state: present
          when: ansible_facts['distribution'] | lower != 'oraclelinux'

        - name: Install SCST build prerequisites (RHEL)
          ansible.builtin.package:
            name:
              - '@Development tools'
              - perl
              - perl-Data-Dumper
              - perl-ExtUtils-MakeMaker
              - rpm-build
              - dkms
            state: present

        - name: Compile SCST RPMs
          ansible.builtin.shell: |
            cd /tmp/scst
            make rpm-dkms
            rm -f /usr/src/packages/RPMS/x86_64/*debug*
          args:
            creates: /usr/src/packages/RPMS/x86_64/scst-dkms-*.rpm

        - name: Install SCST RPMs
          ansible.builtin.shell: |
            dnf install -y /usr/src/packages/RPMS/x86_64/scst*.rpm
          register: scst_rpm_install
          changed_when: "'Nothing to do' not in scst_rpm_install.stdout"

    - name: Build and install SCST (Debian)
      when: ansible_facts['os_family'] | lower == 'debian'
      block:
        - name: Install SCST build prerequisites (Debian)
          ansible.builtin.package:
            name:
              - build-essential
              - debhelper
              - devscripts
              - gcc
              - make
              - lintian
              - quilt
            state: present

        - name: Compile SCST .deb packages
          ansible.builtin.shell: |
            cd /tmp/scst
            make 2release
            make dpkg 1>/dev/null 2>/dev/null
          failed_when: false
          changed_when: true

        - name: Install SCST .deb packages
          ansible.builtin.shell: |
            dpkg -i /tmp/scst/dpkg/iscsi-scst_*.deb
            dpkg -i /tmp/scst/dpkg/scstadmin_*.deb
            dpkg -i /tmp/scst/dpkg/scst-dev_*.deb
            dpkg -i /tmp/scst/dpkg/scst-dkms_*.deb
          register: scst_deb_install
          changed_when: "'already installed' not in scst_deb_install.stderr"

    - name: Remove SCST build directory
      ansible.builtin.file:
        path: /tmp/scst
        state: absent

# https://github.com/LINBIT/linstor-gateway/issues/24#issuecomment-1800271696
- name: Load SCST kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    persistent: present
    state: present
  loop:
    - scst
    - iscsi-scst
    - scst_vdisk

- name: Create iscsi-scst service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/iscsi-scst.service
    mode: '0644'
    content: |
      [Unit]
      Description=iSCSI SCST Target Daemon
      Documentation=man:iscsi-scstd(8)
      After=network.target
      Before=scst.service
      Conflicts=shutdown.target

      [Service]
      EnvironmentFile=-/etc/sysconfig/scst
      PIDFile=/run/iscsi-scstd.pid
      ExecStartPre=/sbin/modprobe iscsi-scst
      ExecStart=/sbin/iscsi-scstd $ISCSID_OPTIONS

      [Install]
      WantedBy=multi-user.target

- name: Start and enable iscsi-scst service
  ansible.builtin.systemd_service:
    name: iscsi-scst.service
    daemon_reload: true
    state: started
    enabled: true
