---
- name: Load OS-specific variables for LINSTOR Gateway satellite
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_major_version'] | int }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}.yml"
      paths:
        - "{{ role_path }}/vars"
      skip: true

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Install DRBD Reactor
  ansible.builtin.include_role:
    name: linbit.drbd_reactor.reactor_install
  vars:
    reactor_install_drbd: false # skip DRBD install, already present
    reactor_install_resource_agents_upstream: true
  when: "'drbd-reactor.service' not in ansible_facts.services"

# Skip linstor_diskless_satellites as Reactor should not promote (6s delay)
- name: Install HA dependencies
  when: inventory_hostname not in groups.get('linstor_diskless_satellites', [])
  block:
    - name: Install LINSTOR Gateway supplemental packages
      ansible.builtin.package:
        name: "{{ linstor_gateway_supplemental_packages }}"
        state: present
      failed_when: false # for now, clear up packaging assumptions later
      notify: disable_and_stop_nfs

    - name: Install SCST
      ansible.builtin.include_tasks: install-scst.yml
      when: linstor_gateway_scst | bool

    - name: Open firewall ports for LINSTOR Gateway satellite services
      ansible.builtin.include_tasks: open-firewall.yml
      when: linstor_gateway_firewall_rules | bool

# Only run when in the presence of a LINSTOR-based inventory
- name: Configure LINSTOR satellite integration
  when:
    - groups.get('linstor_controllers', []) | length > 0
    - groups.get('linstor_satellites', []) | length > 0
    - inventory_hostname in groups['linstor_satellites']
  block:
    - name: Patch linstor_satellite.toml for DRBD Reactor
      ansible.builtin.blockinfile:
        path: /etc/linstor/linstor_satellite.toml
        marker: "# {mark} ANSIBLE MANAGED FILE"
        block: "{{ lookup('template', 'linstor_satellite.j2') }}"
        create: true
        mode: '0644'
        state: present
      notify: restart_linstor_satellite

    - name: Set GatewaySatellite aux property on satellite nodes
      linbit.linstor.node:
        name: "{{ linstor_hostname }}"
        aux_properties:
          GatewaySatellite: "True"
      delegate_to: "{{ groups['linstor_controllers'][0] }}"

- name: Flush handlers for gateway_satellite
  ansible.builtin.meta: flush_handlers
