---
- name: Gather OS facts for OS-specific vars
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - min
  when: ansible_facts['os_family'] is not defined

- name: Load OS-specific variables for LINSTOR Gateway satellite
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_major_version'] | int }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}.yml"
      paths:
        - "{{ role_path }}/vars"
      skip: true

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Install HA dependencies
  when: inventory_hostname in groups.get('linstor_satellites', [])
  block:
    - name: Install LINSTOR Gateway supplemental packages
      ansible.builtin.package:
        name: "{{ gateway_satellite_supplemental_packages }}"
        state: present
      register: _gateway_satellite_packages
      until: _gateway_satellite_packages is succeeded
      retries: 3
      delay: 10
      notify: disable_and_stop_nfs

    # nvmet-tcp moved into the base kernel in Ubuntu 26.04; earlier releases need linux-modules-extra
    - name: Install linux-modules-extra for nvmet-tcp (Ubuntu before 26.04)
      ansible.builtin.apt:
        name: "linux-modules-extra-{{ ansible_facts['kernel'] }}"
        state: present
        update_cache: true
      when:
        - ansible_facts['distribution'] | lower == 'ubuntu'
        - ansible_facts['distribution_major_version'] | int < 26
      register: _gateway_satellite_modules_extra
      until: _gateway_satellite_modules_extra is succeeded
      retries: 3
      delay: 10

    - name: Install SCST
      ansible.builtin.include_role:
        name: linbit.drbd_reactor.scst_install
      when: gateway_satellite_scst | bool

    - name: Install NFS-Ganesha
      ansible.builtin.include_role:
        name: linbit.drbd_reactor.ganesha_install
      when: gateway_satellite_ganesha | bool

    - name: Open firewall ports for LINSTOR Gateway satellite services
      ansible.builtin.include_tasks: open-firewall.yml
      when: gateway_satellite_firewall_rules | bool

# Only run when in the presence of a LINSTOR-based inventory
- name: Configure LINSTOR satellite integration
  when:
    - groups.get('linstor_controllers', []) | length > 0
    - groups.get('linstor_satellites', []) | length > 0
    - inventory_hostname in groups['linstor_satellites']
  block:
    - name: Patch linstor_satellite.toml for DRBD Reactor
      ansible.builtin.blockinfile:
        path: /etc/linstor/linstor_satellite.toml
        marker: "# {mark} ANSIBLE MANAGED FILE"
        block: "{{ lookup('template', 'linstor_satellite.j2') }}"
        create: true
        mode: '0644'
        state: present
      notify: restart_linstor_satellite

    - name: Set GatewaySatellite aux property on satellite nodes
      linbit.linstor.node:
        name: "{{ inventory_hostname }}"
        aux_properties:
          GatewaySatellite: "True"
      delegate_to: "{{ linstor_api_delegate }}"
      environment:
        LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"

    - name: Configure gateway daemon token authentication
      ansible.builtin.include_tasks: token-auth.yml

- name: Flush handlers for gateway_satellite
  ansible.builtin.meta: flush_handlers
