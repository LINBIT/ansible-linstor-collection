---
- name: Restart linstor-satellite.service
  ansible.builtin.systemd_service:
    name: linstor-satellite.service
    daemon_reload: true
    enabled: true
    state: restarted
  listen: restart_linstor_satellite

- name: Read satellite TOML config
  ansible.builtin.slurp:
    src: /etc/linstor/linstor_satellite.toml
  when: inventory_hostname in groups.get('linstor_satellites', [])
  register: _gw_toml
  failed_when: false
  changed_when: false
  listen: restart_linstor_satellite

# 12 second delay ensures node is listed ONLINE after restart
- name: Wait for LINSTOR satellite port
  ansible.builtin.wait_for:
    port: "{{ 3367 if (_gw_toml.content | default('') | b64decode) is search('type.*ssl') else 3366 }}"
    delay: 12
    timeout: 30
  listen: restart_linstor_satellite
  when: inventory_hostname in groups.get('linstor_satellites', [])

- name: Wait for satellite to be ONLINE after restart
  linbit.linstor.node:
    name: "{{ inventory_hostname }}"
    state: query
  when:
    - groups.get('linstor_controllers', []) | length > 0
    - inventory_hostname in groups.get('linstor_satellites', [])
  register: _gw_satellite_status
  until: _gw_satellite_status.connection_status | default('') == 'ONLINE'
  retries: 9
  delay: 5
  delegate_to: "{{ linstor_api_delegate }}"
  become: false
  environment:
    LS_CONTROLLERS: "{{ lookup('linbit.linstor.controller_env') }}"
  listen: restart_linstor_satellite

- name: Gather service facts before NFS disable
  ansible.builtin.service_facts:
  listen: disable_and_stop_nfs
  when: ansible_facts['os_family'] | lower == 'debian'

- name: Disable and stop NFS (Debian)
  ansible.builtin.systemd_service:
    name: nfs-server.service
    enabled: false
  listen: disable_and_stop_nfs
  when:
    - ansible_facts['os_family'] | lower == 'debian'
    - "'nfs-server.service' in ansible_facts.services"
    - ansible_facts.services['nfs-server.service'].status != 'not-found'
