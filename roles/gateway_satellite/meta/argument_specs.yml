# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Install LINSTOR Gateway satellite-side components
    description:
      - Install LINSTOR Gateway satellite-side components on LINSTOR satellite nodes.
      - Installs supplemental packages and patches C(linstor_satellite.toml).
      - Includes C(linbit.drbd_reactor.reactor_install) for DRBD Reactor and OCF resource agents.
    options:
      linstor_gateway_firewall_rules:
        type: bool
        default: true
        description:
          - Manage firewall rules for LINSTOR Gateway satellite ports.
          - Set C(false) to skip firewall configuration.
      linstor_gateway_firewall_ports:
        type: list
        elements: dict
        default:
          - port: "111"
            proto: tcp
          - port: "2049"
            proto: tcp
          - port: "3260"
            proto: tcp
          - port: "4420"
            proto: tcp
        description:
          - Ports to open in firewalld or UFW for NFS, iSCSI, and NVMe-oF.
      linstor_gateway_scst:
        type: bool
        default: false
        description:
          - Compile and install SCST iSCSI target from source as a LIO alternative.
      linstor_gateway_scst_version:
        type: str
        default: "3.9.x"
        description:
          - SCST git tag to build from source.
          - Only used when C(linstor_gateway_scst=true).
      linstor_hostname:
        type: str
        description:
          - Node hostname for LINSTOR.
          - Forces short hostnames on Proxmox VE (detected via kernel version), unaltered otherwise.
