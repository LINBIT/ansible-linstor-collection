# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Install LINSTOR Gateway satellite-side components
    description:
      - Install LINSTOR Gateway satellite-side components on LINSTOR satellite nodes.
      - Installs supplemental packages and patches C(linstor_satellite.toml).
      - Includes C(linbit.drbd_reactor.reactor_install) for DRBD Reactor and OCF resource agents.
    options:
      linstor_gateway_firewall_rules:
        type: bool
        default: true
        description:
          - Manage firewall rules for LINSTOR Gateway satellite ports.
          - Set C(false) to skip firewall configuration.
      linstor_gateway_nfsv4_only:
        type: bool
        default: true
        description:
          - Skip opening NFSv3-only firewall ports (rpcbind 111, mountd 20048).
          - Set to C(false) to allow NFSv3 clients.
      linstor_gateway_firewall_ports_base:
        type: list
        elements: dict
        default:
          - port: "2049"
            proto: tcp
          - port: "3260"
            proto: tcp
          - port: "4420"
            proto: tcp
        description:
          - Firewall ports for nfsd, iSCSI, and NVMe-oF (always open).
      linstor_gateway_firewall_ports_nfsv3:
        type: list
        elements: dict
        default:
          - port: "111"
            proto: tcp
          - port: "20048"
            proto: tcp
        description:
          - Additional firewall ports for NFSv3 (rpcbind and mountd).
          - Only opened when C(linstor_gateway_nfsv4_only=false).
      linstor_gateway_firewall_ports:
        type: list
        elements: dict
        description:
          - Combined list of firewall ports to open.
          - Computed from C(linstor_gateway_firewall_ports_base) and C(linstor_gateway_firewall_ports_nfsv3) based on C(linstor_gateway_nfsv4_only).
          - Override directly for full control.
      linstor_gateway_scst:
        type: bool
        default: false
        description:
          - Compile and install SCST iSCSI target from source as a LIO alternative.
      linstor_gateway_scst_version:
        type: str
        default: "3.10.x"
        description:
          - SCST git tag to build from source.
          - Only used when C(linstor_gateway_scst=true).
      linstor_hostname:
        type: str
        description:
          - Node hostname for LINSTOR.
          - Forces short hostnames on Proxmox VE (detected via kernel version), unaltered otherwise.
