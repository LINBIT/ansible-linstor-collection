# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Install LINSTOR Gateway satellite-side components
    description:
      - Install LINSTOR Gateway satellite-side components on LINSTOR satellite nodes.
      - Installs supplemental packages and patches C(linstor_satellite.toml).
      - Includes C(linbit.drbd_reactor.reactor_install) for DRBD Reactor and OCF resource agents.
    options:
      gateway_satellite_firewall_rules:
        type: bool
        default: true
        description:
          - Manage firewall rules for LINSTOR Gateway satellite ports.
          - Set C(false) to skip firewall configuration.
      gateway_satellite_nfsv4_only:
        type: bool
        default: false
        description:
          - Skip opening NFSv3-only firewall ports (rpcbind 111, mountd 20048).
          - Defaults to C(false) to match C(ha_gateway_nfsv4_only) so the firewall matches what the nfsserver RA actually serves.
          - Set to C(true) once the upstream nfsserver RA NFSv4-only path is reliable.
      gateway_satellite_firewall_ports_base:
        type: list
        elements: dict
        default:
          - port: "2049"
            proto: tcp
          - port: "3260"
            proto: tcp
          - port: "4420"
            proto: tcp
        description:
          - Firewall ports for nfsd, iSCSI, and NVMe-oF (always open).
      gateway_satellite_firewall_ports_nfsv3:
        type: list
        elements: dict
        default:
          - port: "111"
            proto: tcp
          - port: "20048"
            proto: tcp
        description:
          - Additional firewall ports for NFSv3 (rpcbind and mountd).
          - Only opened when C(gateway_satellite_nfsv4_only=false).
      gateway_satellite_firewall_ports:
        type: list
        elements: dict
        description:
          - Combined list of firewall ports to open.
          - >-
            Computed from C(gateway_satellite_firewall_ports_base) and C(gateway_satellite_firewall_ports_nfsv3)
            based on C(gateway_satellite_nfsv4_only).
          - Override directly for full control.
      gateway_satellite_scst:
        type: bool
        default: false
        description:
          - Compile and install SCST iSCSI target from source as a LIO alternative.
          - Delegates to C(linbit.drbd_reactor.scst_install).
          - Pin the SCST git reference with C(scst_install_version) when needed.
      gateway_satellite_ganesha:
        type: bool
        default: false
        description:
          - Install the NFS-Ganesha userspace NFS server as a kernel NFS alternative.
          - Delegates to C(linbit.drbd_reactor.ganesha_install).
          - Pin the CentOS Storage SIG repository version on Enterprise Linux with C(ganesha_install_sig_version) when needed.
      linstor_api_delegate:
        type: str
        required: false
        default: localhost
        description:
          - Delegation target for LINSTOR API tasks (python-linstor module calls).
          - Default C(localhost) runs the calls on the Ansible control node.
          - Override to a cluster node when the control node cannot reach the
            controller API endpoint directly (SSH jump host, segmented
            management network).
          - "Common override: the first host in the C(linstor_controllers) inventory group."
          - The delegated node must have C(python-linstor) installed.
            Cluster nodes have it via LINSTOR package dependencies.
      gateway_satellite_token_auth:
        type: str
        default: ""
        description:
          - Whether the LINSTOR Gateway daemon authenticates to the controller
            with a bearer token.
          - LINSTOR 1.34 and later enable token authentication and REST HTTPS
            during auth init, at which point the daemon needs its own token and
            the controller CA.
          - Leave empty to auto-detect from the controller
            C(Auth/TokenAuthenticationEnabled) property.
          - Set C(true) or C(false) to force the behavior.
      gateway_satellite_token_force:
        type: bool
        default: false
        description:
          - Create the daemon token only when it is missing.
          - Set C(true) to force a fresh token on every run, replacing the
            existing one, for rotation or to recover from a revoked token.
      gateway_satellite_ca_cert:
        type: str
        default: ""
        description:
          - CA certificate PEM content to trust for the controller REST
            endpoint.
          - When set, it is written into C(gateway_satellite_config_dir) and
            used instead of the C(ssl_init) CA file at
            C(gateway_satellite_ca_cert_file).
          - Use it when the cluster does not run C(linbit.linstor.ssl_init) but
            token authentication requires the daemon to trust the controller CA.
