# SPDX-License-Identifier: MIT
galaxy_info:
  author: LINBIT
  description: Install LINSTOR Gateway satellite-side components (NFS/iSCSI resource agents, DRBD Reactor)
  company: LINBIT

  license: MIT

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: Ubuntu
      versions:
        - jammy
        - noble
        - resolute
    - name: EL
      versions:
        - "8"
        - "9"
        - "10"
    - name: opensuse
      versions:
        - "15.0"
        - "15.1"
        - "15.2"
        - "15.3"
        - "15.4"
        - "15.5"
        # - "15.6"
    - name: SLES
      versions:
        - "15"
        - 15SP1
        - 15SP2
        - 15SP3
        - 15SP4
        - 15SP5
        - 15SP6
        # - 15SP7

  min_ansible_version: '2.16'

  galaxy_tags:
    - linbit
    - linstor
    - gateway
    - nfs
    - iscsi
    - ha

dependencies:
  - role: linbit.drbd_reactor.reactor_install
    vars:
      reactor_install_drbd: false
      reactor_install_resource_agents_upstream: true
      # SCST and NFS-Ganesha are delegated from tasks/main.yml; keep the
      # meta dependency from installing them a second time
      reactor_install_scst: false
      reactor_install_ganesha: false
